<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Философский Детектив — 3D Демо</title>
<script src="aframe.min.js"></script>
<script src="aframe-extras.min.js"></script>
<script>
// Компонент только показывает/скрывает подсказку по близости.
// Нажатие E обрабатывается глобально внизу страницы — там где dlgActive определён.
AFRAME.registerComponent('npc-interact', {
  schema: { radius: { type: 'number', default: 4 } },
  init() {
    this.hint = document.getElementById('interact-hint');
    this.inRange = false;
    // Сохраняем ссылку на NPC в глобальный список
    if (!window._npcs) window._npcs = [];
    window._npcs.push({ el: this.el, radius: this.data.radius });
  },
  tick() {
    const player = document.getElementById('player');
    if (!player || !player.object3D) return;
    const dist = player.object3D.position.distanceTo(this.el.object3D.position);
    const inRange = dist < this.data.radius;
    if (inRange !== this.inRange) {
      this.inRange = inRange;
      this.hint.style.display = inRange ? 'block' : 'none';
    }
  }
});
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Georgia, serif; background: #000; }

  /* ── Экран "Нажмите для начала" ── */
  #start-screen {
    position: fixed; inset: 0; z-index: 999;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: opacity .6s;
  }
  #start-screen h1 {
    color: #e8d5b0; font-size: 2em; letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(180,120,255,.8);
    margin-bottom: 12px;
  }
  #start-screen p { color: rgba(200,160,255,.5); font-size: .8em; letter-spacing: 4px; }
  #start-screen .sub { margin-top: 40px; color: rgba(255,255,255,.3); font-size: .7em; letter-spacing: 2px; }

  /* ── Подсказка взаимодействия ── */
  #interact-hint {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    display: none; z-index: 100;
    background: rgba(5,2,20,.85); border: 1px solid rgba(150,100,255,.5);
    color: #c0a0ff; padding: 10px 24px; font-size: .85em; letter-spacing: 2px;
    animation: pulse-hint 1.5s ease-in-out infinite;
  }
  @keyframes pulse-hint {
    0%, 100% { opacity: 0.7; } 50% { opacity: 1; }
  }

  /* ── Диалог ── */
  #dialogue-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: none; align-items: flex-end; justify-content: center;
    padding-bottom: 40px;
    background: linear-gradient(to top, rgba(0,0,15,.8) 0%, transparent 50%);
  }
  #dialogue-overlay.active { display: flex; }
  #dialogue-box {
    display: flex; gap: 20px; align-items: flex-start;
    width: min(680px, 90vw);
    background: rgba(6,2,22,.96); border: 1px solid rgba(150,100,255,.45);
    padding: 22px 26px; position: relative;
  }
  #dlg-portrait {
    width: 56px; height: 56px; flex-shrink: 0; border-radius: 50%;
    background: rgba(130,60,255,.25); border: 1px solid rgba(150,100,255,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5em; color: #c0a0ff;
  }
  #dlg-speaker {
    color: #9060ff; font-size: .75em; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  #dlg-text { color: #ddd0ff; font-size: .95em; line-height: 1.75; }
  #dlg-next {
    position: absolute; bottom: 14px; right: 18px;
    background: none; border: 1px solid rgba(150,100,255,.4);
    color: rgba(180,140,255,.6); padding: 6px 16px;
    cursor: pointer; font-family: Georgia, serif; font-size: .75em; letter-spacing: 2px;
    transition: all .2s;
  }
  #dlg-next:hover { background: rgba(150,100,255,.2); color: #c0a0ff; }

  /* ── Крестик прицела ── */
  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(200,180,255,.4); font-size: 18px;
    pointer-events: none; z-index: 50; display: none;
  }

  /* ── Управление (справка) ── */
  #controls-hint {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(180,160,255,.3); font-size: .65em; letter-spacing: 2px;
    z-index: 50; display: none; pointer-events: none;
  }
</style>
</head>
<body>

<!-- Экран старта -->
<div id="start-screen" onclick="startGame()">
  <h1>ФИЛОСОФСКИЙ ДЕТЕКТИВ</h1>
  <p>НАЖМИТЕ ДЛЯ НАЧАЛА</p>
  <div class="sub">WASD — движение &nbsp;·&nbsp; МЫШЬ — обзор &nbsp;·&nbsp; E — взаимодействие</div>
</div>

<!-- Подсказка взаимодействия -->
<div id="interact-hint">[E] &nbsp; Поговорить</div>

<!-- Крестик -->

<!-- Подсказка управления -->
<div id="controls-hint">WASD — движение &nbsp;·&nbsp; МЫШЬ — обзор &nbsp;·&nbsp; E — взаимодействие</div>

<!-- Диалог -->

  <div id="dialogue-box">

<script>
// ────────────────────────────────────────────────────────────
// ДАННЫЕ ДИАЛОГОВ
// Чтобы добавить NPC — добавь объект в DIALOGUES с id NPC
// ────────────────────────────────────────────────────────────
const DIALOGUES = {
  'npc-nietzsche': [
    {
      speaker: 'Ницше',
      icon:    'N',
      text:    '...Наконец кто-то пришёл. Вы ищете истину, детектив? Какая наивность.'
    },
    {
      speaker: 'Детектив',
      icon:    '🔍',
      text:    'Мне нужно понять вашу философию. Говорят, вы утверждали, что Бог мёртв.'
    },
    {
      speaker: 'Ницше',
      icon:    'N',
      text:    'Я не убивал его. Это сделали вы все — своей наукой, своим прогрессом, своим отказом от веры в пользу разума. Я лишь первым произнёс это вслух.'
    },
    {
      speaker: 'Детектив',
      icon:    '🔍',
      text:    'И что остаётся после смерти Бога?'
    },
    {
      speaker: 'Ницше',
      icon:    'N',
      text:    'Сверхчеловек. Тот, кто не ищет смысл — а создаёт его. Воля к власти — это не желание господствовать над другими. Это желание преодолевать самого себя. Вот ваша улика.'
    },
    {
      speaker: 'Детектив',
      icon:    '🔍',
      text:    '[ Улика получена: «Воля к власти — воля к самопреодолению» ]'
    }
  ]
};

// ────────────────────────────────────────────────────────────
// СОСТОЯНИЕ ДИАЛОГА
// ────────────────────────────────────────────────────────────
let dlgQueue   = [];
let dlgActive  = false;
let currentNpc = null;

function showDialogue(npcId) {
  const lines = DIALOGUES[npcId];
  if (!lines) return;
  dlgQueue  = [...lines];
  dlgActive = true;
  document.getElementById('interact-hint').style.display = 'none';
  document.getElementById('dialogue-overlay').classList.add('active');
  renderLine();
}

function renderLine() {
  if (!dlgQueue.length) { closeDialogue(); return; }
  const line = dlgQueue.shift();
  document.getElementById('dlg-portrait').textContent = line.icon || line.speaker[0];
  document.getElementById('dlg-speaker').textContent  = line.speaker;
  document.getElementById('dlg-text').textContent     = line.text;
}

function nextLine() { renderLine(); }

function closeDialogue() {
  dlgActive = false;
  document.getElementById('dialogue-overlay').classList.remove('active');
}

// ────────────────────────────────────────────────────────────
// СТАРТ ИГРЫ (pointer lock)
// ────────────────────────────────────────────────────────────
function startGame() {
  const screen = document.getElementById('start-screen');
  screen.style.opacity = '0';
  setTimeout(() => {
    screen.style.display = 'none';
    document.getElementById('crosshair').style.display = 'block';
    document.getElementById('controls-hint').style.display = 'block';
    // Запросить pointer lock через A-Frame
    const scene = document.querySelector('a-scene');
    scene.canvas.requestPointerLock();
  }, 600);
}

// Глобальный обработчик клавиш
window.addEventListener('keydown', (e) => {
  // ESC — закрыть диалог
  if (e.key === 'Escape' && dlgActive) { closeDialogue(); return; }

  // E — взаимодействие
  if (e.key !== 'e' && e.key !== 'E') return;
  if (dlgActive) return;

  // Найти ближайший NPC с проверкой дистанции
  const player = document.getElementById('player');
  if (player && player.object3D) {
    const npcs = window._npcs || [];
    for (const npc of npcs) {
      if (!npc.el.object3D) continue;
      const pPos = player.object3D.position;
      const nPos = npc.el.object3D.position;
      const dx = pPos.x - nPos.x, dz = pPos.z - nPos.z;
      const dist = Math.sqrt(dx*dx + dz*dz); // только XZ, игнорируем Y
      if (dist < npc.radius) {
        showDialogue(npc.el.id);
        return;
      }
    }
  }
  // Fallback: если NPC не найден по дистанции — всё равно показать диалог
  showDialogue('npc-nietzsche');
});

</script>
