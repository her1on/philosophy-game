<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Антисциентистские направления — Philosophia</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#040010;overflow:hidden;font-family:Georgia,serif;color:#e8e0ff;width:100vw;height:100vh}
#scene-bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;will-change:transform;transform:scale(1.04)}
#embers{position:fixed;inset:0;pointer-events:none;z-index:5}
.torch-fx{position:fixed;pointer-events:none;z-index:6;transform:translate(-50%,-100%)}
.torch-glow-anim{position:absolute;top:50%;left:50%;width:180px;height:180px;transform:translate(-50%,-5%);
  background:radial-gradient(circle,rgba(150,60,255,.32) 0%,transparent 68%);border-radius:50%;animation:glow-p 1.7s ease-in-out infinite}
.flame-outer{position:relative;width:22px;height:40px;margin:0 auto;
  background:radial-gradient(ellipse at 50% 68%,#fff0ff 0%,#d070ff 26%,#8020c0 60%,transparent 90%);
  border-radius:50% 50% 38% 38%/62% 62% 45% 45%;filter:blur(1.8px);animation:flick .48s ease-in-out infinite;transform-origin:50% 100%}
.flame-inner{position:absolute;bottom:5px;left:50%;width:11px;height:22px;transform:translateX(-50%);
  background:radial-gradient(ellipse at 50% 65%,#ffffff 0%,#f0d0ff 28%,#c060ff 62%,transparent 90%);
  border-radius:50% 50% 35% 35%/60% 60% 45% 45%;filter:blur(.5px);animation:flick .36s ease-in-out infinite reverse;transform-origin:50% 100%}
@keyframes flick{0%,100%{transform:scaleX(1) scaleY(1) rotate(-2deg);opacity:.9}22%{transform:scaleX(.76) scaleY(1.18) rotate(5deg);opacity:.7}48%{transform:scaleX(1.14) scaleY(.86) rotate(-1deg);opacity:.97}72%{transform:scaleX(.82) scaleY(1.12) rotate(6deg);opacity:.74}}
@keyframes glow-p{0%,100%{opacity:1;transform:translate(-50%,-5%) scale(1)}50%{opacity:.58;transform:translate(-50%,-5%) scale(1.18)}}
.hotspot{position:fixed;cursor:pointer;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:20;transition:filter .22s,transform .22s}
.hotspot:hover{filter:drop-shadow(0 0 16px rgba(200,120,255,.8));transform:translateX(-50%) translateY(-5px)}
.hotspot svg{display:block}
.char-label{margin-top:7px;font-size:.63em;letter-spacing:2.5px;color:rgba(200,160,255,.55);white-space:nowrap;transition:color .2s}
.hotspot:hover .char-label{color:rgba(210,170,255,.95)}
.hotspot.found{filter:drop-shadow(0 0 8px rgba(120,255,180,.5))}
.hotspot.found .char-label{color:rgba(120,255,180,.65)}
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 28px 20px;background:linear-gradient(to bottom,rgba(4,0,16,.92) 60%,transparent);pointer-events:none}
#back-btn{pointer-events:all;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(220,200,255,.75);padding:8px 16px;cursor:pointer;font-family:Georgia,serif;font-size:.8em;letter-spacing:1px;border-radius:4px;transition:background .2s}
#back-btn:hover{background:rgba(255,255,255,.13)}
#loc-title{font-size:.82em;letter-spacing:5px;color:#b070ff;text-shadow:0 0 20px rgba(150,70,255,.4)}
#prog-wrap{display:flex;align-items:center;gap:10px}
.pdot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:transparent;transition:background .4s,border-color .4s}
.pdot.on{background:#c060ff;border-color:#c060ff}
#prog-text{font-size:.72em;color:rgba(180,120,255,.55);font-family:sans-serif}
#hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);font-size:.66em;letter-spacing:3px;color:rgba(200,160,255,.28);pointer-events:none;z-index:30;transition:opacity .3s}
#dlg{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:22px 40px 28px;background:linear-gradient(to top,rgba(4,0,16,.99) 78%,transparent);border-top:1px solid rgba(150,80,255,.1);transform:translateY(110%);transition:transform .36s cubic-bezier(.25,.8,.25,1)}
#dlg.open{transform:translateY(0)}
.dlg-inner{max-width:920px;margin:0 auto;display:flex;gap:20px;align-items:flex-start}
.dlg-icon{width:54px;height:54px;border-radius:50%;flex-shrink:0;background:rgba(150,60,255,.18);border:1px solid rgba(150,60,255,.38);display:flex;align-items:center;justify-content:center;font-size:1.35em;color:#c090ff}
.dlg-body{flex:1}
.dlg-speaker{font-size:.73em;letter-spacing:3px;color:#b070ff;margin-bottom:6px;text-transform:uppercase}
.dlg-quote{font-style:italic;font-size:1.05em;color:#ede5d0;line-height:1.5;margin-bottom:9px}
.dlg-desc{font-size:.81em;color:rgba(200,190,230,.64);line-height:1.72}
#dlg-close{background:none;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.38);width:28px;height:28px;cursor:pointer;border-radius:4px;font-size:.85em;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
#dlg-close:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
#complete{position:fixed;inset:0;z-index:500;background:rgba(4,0,16,.94);display:none;flex-direction:column;align-items:center;justify-content:center}
#complete.show{display:flex}
.cmp-stars{font-size:2em;letter-spacing:10px;margin-bottom:20px}
.cmp-title{font-size:1.7em;color:#b060ff;letter-spacing:5px;margin-bottom:10px;text-shadow:0 0 30px rgba(160,70,255,.5)}
.cmp-sub{font-size:.82em;color:rgba(200,160,255,.55);letter-spacing:2px;margin-bottom:32px}
.cmp-btn{background:rgba(150,60,255,.14);border:1px solid rgba(150,60,255,.4);color:#b060ff;padding:12px 34px;cursor:pointer;font-family:Georgia,serif;font-size:.88em;letter-spacing:2px;border-radius:4px;transition:background .2s}
.cmp-btn:hover{background:rgba(150,60,255,.26)}
</style>

const TOTAL=3; let found=new Set();

function update_progress(){
  for(let i=0;i<TOTAL;i++) document.getElementById('d'+i).classList.toggle('on',i<found.size);
  document.getElementById('prog-text').textContent=found.size+' / '+TOTAL;
  localStorage.setItem('modern_anti',found.size);
}
function open_dlg(id){
  const d=DATA[id];
  document.getElementById('dlg-icon').textContent=d.icon;
  document.getElementById('dlg-speaker').textContent=d.speaker;
  document.getElementById('dlg-quote').textContent=d.quote;
  document.getElementById('dlg-desc').textContent=d.desc;
  document.getElementById('dlg').classList.add('open');
  document.getElementById('hint').style.opacity='0';
  if(!found.has(id)){
    found.add(id);
    document.getElementById('h-'+id).classList.add('found');
    update_progress();
    if(found.size===TOTAL) setTimeout(()=>{ close_dlg(); document.getElementById('complete').classList.add('show'); },1800);
  }
}
function close_dlg(){
  document.getElementById('dlg').classList.remove('open');
  if(found.size<TOTAL) document.getElementById('hint').style.opacity='1';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') close_dlg(); });

function positionFlames(){
  const svg=document.getElementById('scene-bg');
  const ctm=svg.getScreenCTM(); if(!ctm) return;
  const pt=svg.createSVGPoint();
  pt.x=91; pt.y=404; const l=pt.matrixTransform(ctm);
  document.getElementById('flame-l').style.cssText+=`;left:${l.x}px;top:${l.y}px`;
  pt.x=1509; pt.y=404; const r=pt.matrixTransform(ctm);
  document.getElementById('flame-r').style.cssText+=`;left:${r.x}px;top:${r.y}px`;
}
(function(){
  const bg=document.getElementById('scene-bg');
  document.addEventListener('mousemove',e=>{
    const cx=(e.clientX/innerWidth-.5)*2,cy=(e.clientY/innerHeight-.5)*2;
    bg.style.transform=`scale(1.04) translate(${cx*-14}px,${cy*-7}px)`;
    positionFlames();
  });
})();
(function(){
  const canvas=document.getElementById('embers'),ctx=canvas.getContext('2d');
  let p=[];
  function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
  function fp(id){ const el=document.getElementById(id); if(!el) return{x:0,y:0}; const r=el.getBoundingClientRect(); return{x:r.left+r.width*.5,y:r.top+r.height*.35}; }
  const C=['#d070ff','#9040c0','#f0c0ff','#ffffff','#b050e0'];
  function sp(x,y){ p.push({x:x+(Math.random()-.5)*18,y:y+Math.random()*8,vx:(Math.random()-.5)*1.4,vy:-(Math.random()*2.2+.8),r:Math.random()*2.2+.8,life:1,decay:Math.random()*.012+.006,c:C[Math.floor(Math.random()*C.length)]}); }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(Math.random()<.75){const q=fp('flame-l');sp(q.x,q.y);}
    if(Math.random()<.75){const q=fp('flame-r');sp(q.x,q.y);}
    p=p.filter(q=>q.life>0);
    p.forEach(q=>{ q.x+=q.vx;q.y+=q.vy;q.vx+=(Math.random()-.5)*.18;q.vy-=.02;q.life-=q.decay;
      ctx.globalAlpha=q.life*q.life;ctx.fillStyle=q.c;ctx.beginPath();ctx.arc(q.x,q.y,q.r*q.life+.3,0,Math.PI*2);ctx.fill(); });
    ctx.globalAlpha=1; requestAnimationFrame(tick);
  }
  resize(); window.addEventListener('resize',()=>{ resize(); positionFlames(); }); tick();
})();
requestAnimationFrame(()=>requestAnimationFrame(positionFlames));
</script>
</body>
</html>
