<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ФИЛОСОФСКИЙ ДЕТЕКТИВ — История западной мысли</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
button { cursor:pointer; font-family:inherit; }

/* ── Фон: тёмный кабинет с янтарным светом ── */
body {
  min-height: 100vh;
  background-color: #0e0b06;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -5%, rgba(180,120,40,.28) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 15% 40%, rgba(120,70,20,.12) 0%, transparent 50%),
    radial-gradient(ellipse 30% 40% at 85% 60%, rgba(100,60,15,.08) 0%, transparent 50%);
  color: #e8d9b0;
  font-family: Georgia, 'Times New Roman', serif;
  padding-bottom: 80px;
  overflow-x: hidden;
}

/* ── Геометрический декор (как на стене в референсе) ── */
body::before {
  content: '';
  position: fixed;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background-image:
    radial-gradient(circle at center, transparent 38%, rgba(180,140,60,.07) 39%, transparent 40%),
    radial-gradient(circle at center, transparent 55%, rgba(180,140,60,.05) 56%, transparent 57%),
    radial-gradient(circle at center, transparent 70%, rgba(180,140,60,.04) 71%, transparent 72%);
  background-size: 100% 100%;
  border: 1px solid rgba(180,140,60,.06);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  transform: rotate(15deg);
}

/* ── Hero-шапка ── */
.hero {
  position: relative;
  text-align: center;
  padding: 72px 32px 56px;
  z-index: 1;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 320px; height: 1px;
  background: linear-gradient(to right, transparent, rgba(180,140,60,.5), transparent);
}

.hero-pretitle {
  font-size: .62em;
  letter-spacing: 8px;
  color: rgba(180,140,60,.65);
  text-transform: uppercase;
  margin-bottom: 20px;
}

.hero-title {
  font-size: 3.6em;
  color: #c8a84b;
  letter-spacing: 5px;
  line-height: 1;
  font-weight: bold;
  text-shadow:
    0 0 60px rgba(180,130,40,.35),
    0 2px 4px rgba(0,0,0,.6);
  margin-bottom: 16px;
}

.hero-subtitle {
  font-size: .68em;
  letter-spacing: 5px;
  color: rgba(200,168,90,.55);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.hero-tagline {
  font-size: .82em;
  color: rgba(220,200,150,.45);
  font-style: italic;
}

/* ── Декоративный разделитель ── */
.ornament {
  text-align: center;
  color: rgba(180,140,60,.35);
  letter-spacing: 12px;
  font-size: .75em;
  margin: 0 auto;
  padding: 28px 0 20px;
  position: relative; z-index: 1;
}

/* ── Временна́я шкала ── */
.timeline-wrap {
  max-width: 1060px;
  margin: 0 auto;
  padding: 0 40px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: relative; z-index: 1;
}
.timeline-wrap::-webkit-scrollbar { height: 3px; }
.timeline-wrap::-webkit-scrollbar-track { background: rgba(180,140,60,.05); }
.timeline-wrap::-webkit-scrollbar-thumb { background: rgba(180,140,60,.2); border-radius: 2px; }

.timeline-inner {
  position: relative;
  display: flex;
  align-items: flex-start;
  padding: 44px 10px 52px;
  min-width: 760px;
  gap: 0;
}

/* Линия шкалы */
.timeline-inner::before {
  content: '';
  position: absolute;
  top: 82px;
  left: 10px; right: 10px;
  height: 1px;
  background: linear-gradient(to right,
    transparent 0%,
    rgba(180,140,60,.3) 8%,
    rgba(180,140,60,.6) 50%,
    rgba(200,160,70,.8) 88%,
    rgba(180,140,60,.3) 100%
  );
  box-shadow: 0 0 8px rgba(180,140,60,.15);
}

.epoch-node {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  min-width: 110px;
}

.epoch-year {
  font-size: .58em;
  letter-spacing: 1px;
  color: rgba(180,140,60,.5);
  margin-bottom: 8px;
  text-align: center;
  height: 16px;
}

.epoch-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(180,140,60,.4);
  background: rgba(180,140,60,.15);
  position: relative; z-index: 1;
  flex-shrink: 0;
  transition: all .2s;
}

.epoch-node.available .epoch-dot {
  width: 18px; height: 18px;
  background: #c8a84b;
  border-color: #e0c060;
  box-shadow:
    0 0 0 4px rgba(200,168,75,.15),
    0 0 16px rgba(200,168,75,.4);
}

.epoch-name {
  margin-top: 14px;
  font-size: .75em;
  font-weight: bold;
  color: rgba(200,170,100,.55);
  text-align: center;
  line-height: 1.3;
  transition: color .2s;
}
.epoch-node.available .epoch-name {
  color: #c8a84b;
}

.epoch-period {
  font-size: .58em;
  color: rgba(180,140,60,.35);
  text-align: center;
  margin-top: 4px;
  line-height: 1.4;
}

.epoch-badge {
  margin-top: 10px;
  font-size: .58em;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 1px;
  text-align: center;
  color: rgba(180,140,60,.35);
  border: 1px solid rgba(180,140,60,.15);
}
.epoch-badge.available {
  background: rgba(180,140,60,.15);
  border-color: rgba(200,160,70,.5);
  color: #c8a84b;
  cursor: pointer;
  transition: all .2s;
}
.epoch-badge.available:hover {
  background: rgba(180,140,60,.3);
  box-shadow: 0 0 12px rgba(200,160,70,.2);
}

/* ── Секция с карточками ── */
.section-label {
  text-align: center;
  font-size: .58em;
  letter-spacing: 6px;
  color: rgba(180,140,60,.4);
  text-transform: uppercase;
  padding: 36px 0 20px;
  position: relative; z-index: 1;
}
.section-label::before, .section-label::after {
  content: '——';
  margin: 0 12px;
  opacity: .5;
}

.epochs-grid {
  max-width: 1060px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  position: relative; z-index: 1;
}

/* ── Карточки как старые письма на столе ── */
.epoch-card {
  background: linear-gradient(145deg, #e8d9b0 0%, #dccf9e 60%, #d4c490 100%);
  border: 1px solid rgba(120,90,40,.4);
  padding: 20px 22px;
  position: relative;
  transition: all .22s;
  box-shadow:
    2px 3px 12px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.15);
  color: #2a1a08;
}
/* Случайные микро-повороты — эффект разбросанных бумаг */
.epoch-card:nth-child(3n+1) { transform: rotate(-0.4deg); }
.epoch-card:nth-child(3n+2) { transform: rotate(0.3deg); }
.epoch-card:nth-child(3n+3) { transform: rotate(-0.2deg); }

.epoch-card.available {
  cursor: pointer;
  background: linear-gradient(145deg, #eee0ba 0%, #e4d5a8 60%, #d8c990 100%);
  border-color: rgba(140,100,30,.5);
}
.epoch-card.available:hover {
  transform: rotate(0deg) translateY(-4px) scale(1.01);
  box-shadow:
    4px 8px 24px rgba(0,0,0,.6),
    0 0 20px rgba(180,140,40,.15),
    inset 0 1px 0 rgba(255,255,255,.2);
}
.epoch-card.locked {
  opacity: .75;
  filter: saturate(.7);
}

/* Линейки как на старой бумаге */
.epoch-card::before {
  content: '';
  position: absolute;
  top: 52px; left: 16px; right: 16px;
  height: 1px;
  background: rgba(120,90,40,.15);
  box-shadow:
    0 28px 0 rgba(120,90,40,.1),
    0 56px 0 rgba(120,90,40,.08);
}

.card-num {
  font-size: .56em;
  letter-spacing: 3px;
  color: rgba(80,50,20,.5);
  text-transform: uppercase;
  margin-bottom: 7px;
  position: relative;
}
.card-name {
  font-size: 1.08em;
  font-weight: bold;
  color: #1a0e04;
  margin-bottom: 4px;
  line-height: 1.2;
  position: relative;
}
.card-period {
  font-size: .68em;
  color: rgba(80,50,20,.65);
  margin-bottom: 14px;
  font-style: italic;
  position: relative;
}
.card-desc {
  font-size: .76em;
  color: #3a2010;
  line-height: 1.65;
  margin-bottom: 16px;
  position: relative;
}
.card-status {
  font-size: .62em;
  letter-spacing: 1px;
  padding: 4px 12px;
  border-radius: 1px;
  display: inline-block;
  position: relative;
}
.card-status.available {
  background: rgba(40,60,20,.85);
  color: #c8e8a0;
  border: 1px solid rgba(80,100,40,.5);
}
.card-status.wip {
  color: rgba(80,50,20,.6);
  border: 1px solid rgba(120,90,40,.25);
}

.card-arrow {
  position: absolute;
  top: 18px; right: 18px;
  font-size: 1em;
  color: #8a6030;
  opacity: 0;
  transition: opacity .2s;
}
.epoch-card.available:hover .card-arrow { opacity: 1; }

/* ── Подвал ── */
.footer {
  max-width: 1060px;
  margin: 56px auto 0;
  padding: 0 40px;
  position: relative; z-index: 1;
}
.footer-line {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(180,140,60,.25), transparent);
  margin-bottom: 16px;
}
.footer-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.footer-note { font-size: .6em; color: rgba(180,140,60,.35); letter-spacing: 1px; font-style: italic; }
.footer-link a { font-size: .6em; color: rgba(180,140,60,.4); letter-spacing: 1px; text-decoration: none; }
.footer-link a:hover { color: rgba(180,140,60,.7); }

/* ── Тост ── */
.wip-toast {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(20,14,6,.96);
  color: rgba(200,168,90,.8);
  padding: 11px 28px;
  font-size: .78em; letter-spacing: 2px;
  border: 1px solid rgba(180,140,60,.3);
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
  white-space: nowrap;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
}
.wip-toast.show { opacity: 1; }

@media (max-width: 640px) {
  .hero-title { font-size: 2.2em; }
  .timeline-wrap, .epochs-grid, .footer { padding: 0 20px; }
  .epochs-grid { grid-template-columns: 1fr; }
  .epoch-card:nth-child(n) { transform: none; }
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-pretitle">Образовательная игра</div>
  <div class="hero-title">ФИЛОСОФСКИЙ ДЕТЕКТИВ</div>
  <div class="hero-subtitle">История западной мысли · VI век до н.э. — XX век</div>
  <div class="hero-tagline">Выберите эпоху для исследования</div>
</div>

<div class="ornament">· · · ✦ · · ·</div>

<!-- Шкала -->
<div class="timeline-wrap">
  <div class="timeline-inner" id="timeline"></div>
</div>

<div class="section-label">Эпохи</div>

<!-- Карточки -->
<div class="epochs-grid" id="epochs-grid"></div>

<!-- Подвал -->
<div class="footer">
  <div class="footer-line"></div>
  <div class="footer-inner">
    <div class="footer-note">Герман О.Н. «История философии», ТУСУР, 2021</div>
    <div class="footer-link"><a href="https://github.com/her1on/philosophy-game" target="_blank">GitHub →</a></div>
  </div>
</div>

<div class="wip-toast" id="wip-toast">Эта локация ещё в разработке</div>

<script>
const EPOCHS = [
  {
    id: 'east',
    name: 'Древний Восток',
    period: 'до VI в. до н.э.',
    year: 'до VI в.',
    desc: 'Философия Древней Индии, Китая и Ближнего Востока. Веды, упанишады, даосизм, конфуцианство.',
    available: false,
  },
  {
    id: 'ancient',
    name: 'Античность',
    period: 'VI в. до н.э. — V в. н.э.',
    year: 'VI в. до н.э.',
    desc: 'От досократиков до неоплатонизма. Сократ, Платон, Аристотель, стоики, эпикурейцы.',
    available: false,
  },
  {
    id: 'medieval',
    name: 'Средневековье',
    period: 'V — XIV вв.',
    year: 'V–XIV вв.',
    desc: 'Патристика, схоластика, мистика. Августин, Фома Аквинский, Уильям Оккам.',
    available: false,
  },
  {
    id: 'renaissance',
    name: 'Возрождение',
    period: 'XIV — XVI вв.',
    year: 'XIV–XVI вв.',
    desc: 'Гуманизм, натурфилософия, социальные утопии. Эразм, Макиавелли, Бруно, Монтень.',
    available: false,
  },
  {
    id: 'newtime',
    name: 'Новое время',
    period: 'XVII — XVIII вв.',
    year: 'XVII–XVIII вв.',
    desc: 'Рационализм и эмпиризм. Декарт, Спиноза, Лейбниц, Локк, Юм, Кант.',
    available: false,
  },
  {
    id: 'german',
    name: 'Немецкая классическая',
    period: 'конец XVIII — начало XIX в.',
    year: 'XVIII–XIX вв.',
    desc: 'Немецкий идеализм. Кант, Фихте, Шеллинг, Гегель, Фейербах.',
    available: false,
  },
  {
    id: 'modern',
    name: 'Новейшая западная',
    period: 'XIX — XX вв.',
    year: 'XIX–XX вв.',
    desc: 'Антисциентизм и сциентизм. Ницше, Фрейд, Хайдеггер, Витгенштейн, Деррида.',
    available: true,
    url: 'philosophia.html',
  },
];

function renderTimeline() {
  const tl = document.getElementById('timeline');
  EPOCHS.forEach(ep => {
    const node = document.createElement('div');
    node.className = `epoch-node ${ep.available ? 'available' : 'locked'}`;
    node.innerHTML = `
      <div class="epoch-year">${ep.year}</div>
      <div class="epoch-dot"></div>
      <div class="epoch-name">${ep.name}</div>
      <div class="epoch-period">${ep.period}</div>
      <div class="epoch-badge ${ep.available ? 'available' : ''}">${ep.available ? 'Изучить →' : 'Скоро'}</div>`;
    if (ep.available) {
      node.querySelector('.epoch-badge').addEventListener('click', () => location.href = ep.url);
    }
    tl.appendChild(node);
  });
}

function renderCards() {
  const grid = document.getElementById('epochs-grid');
  EPOCHS.forEach((ep, i) => {
    const card = document.createElement('div');
    card.className = `epoch-card ${ep.available ? 'available' : 'locked'}`;
    card.innerHTML = `
      <div class="card-arrow">→</div>
      <div class="card-num">Эпоха ${i + 1}</div>
      <div class="card-name">${ep.name}</div>
      <div class="card-period">${ep.period}</div>
      <div class="card-desc">${ep.desc}</div>
      <span class="card-status ${ep.available ? 'available' : 'wip'}">${ep.available ? 'Открыто' : 'В разработке'}</span>`;
    card.addEventListener('click', () => ep.available ? location.href = ep.url : showWip());
    grid.appendChild(card);
  });
}

let wipTimer = null;
function showWip() {
  const t = document.getElementById('wip-toast');
  t.classList.add('show');
  clearTimeout(wipTimer);
  wipTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

renderTimeline();
renderCards();
</script>
</body>
</html>
