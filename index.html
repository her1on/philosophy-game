<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Философский Детектив</title>
<style>
/* ── Сброс ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: Georgia, serif; color: #e0d0ff; }
#canvas { display: block; position: fixed; inset: 0; }

/* ── HUD ── */
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 18px 24px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none; z-index: 100;
  background: linear-gradient(to bottom, rgba(0,0,20,.88), transparent);
}
#loc-title {
  color: #e8d5b0; font-size: 1.05em; letter-spacing: 3px;
  text-shadow: 0 0 16px rgba(180,130,50,.9);
}
#back-btn {
  pointer-events: all; display: none;
  background: rgba(100,60,200,.2); border: 1px solid rgba(150,100,255,.5);
  color: #c0a0ff; padding: 8px 18px; cursor: pointer;
  font-family: Georgia, serif; font-size: .85em; letter-spacing: 1px;
  transition: background .3s;
}
#back-btn:hover { background: rgba(150,100,255,.3); }

/* ── Панель информации (справа) ── */
#info-panel {
  position: fixed; right: -460px; top: 50%; transform: translateY(-50%);
  width: 440px; max-height: 88vh;
  background: rgba(8,4,28,.97);
  border: 1px solid rgba(130,80,255,.35); border-right: none;
  padding: 32px 28px 28px; z-index: 200;
  transition: right .45s cubic-bezier(.25,.8,.25,1);
  overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: rgba(130,80,255,.4) transparent;
}
#info-panel.open { right: 0; }
#panel-close {
  position: absolute; top: 14px; right: 14px;
  background: none; border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.55); width: 28px; height: 28px;
  cursor: pointer; font-size: .9em; display: flex;
  align-items: center; justify-content: center; transition: all .2s;
}
#panel-close:hover { background: rgba(255,255,255,.1); color: #fff; }
#info-panel h2  { color: #c090ff; font-size: 1.2em; margin-bottom: 10px; line-height: 1.3; }
#p-phil  { color: #90b0ff; font-size: .78em; margin-bottom: 14px; letter-spacing: .5px; line-height: 1.6; }
#p-desc  { line-height: 1.78; font-size: .87em; margin-bottom: 14px; color: #ccc0f0; }
#p-quote {
  border-left: 2px solid rgba(180,120,255,.55);
  padding: 8px 14px; margin: 14px 0;
  font-style: italic; color: #a898dd; font-size: .83em; line-height: 1.65;
}
#p-tags  { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  background: rgba(120,80,255,.15); border: 1px solid rgba(130,80,255,.35);
  padding: 4px 11px; font-size: .74em; border-radius: 20px; color: #c0a8ff;
}

/* ── Диалог ── */
#dialog-overlay {
  position: fixed; inset: 0;
  display: none; align-items: flex-end; justify-content: center;
  padding-bottom: 60px; z-index: 300;
  background: linear-gradient(to top, rgba(0,0,20,.75), transparent 60%);
  cursor: pointer;
}
#dialog-overlay.active { display: flex; }
#dialog-box {
  display: flex; align-items: flex-start; gap: 20px;
  background: rgba(6,3,20,.95);
  border: 1px solid rgba(150,100,255,.4);
  padding: 24px 28px; max-width: 700px; width: 90%;
  position: relative;
}
#dlg-icon {
  width: 52px; height: 52px; flex-shrink: 0;
  border-radius: 50%;
  background: rgba(150,100,255,.2); border: 1px solid rgba(150,100,255,.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4em; color: #c0a0ff;
}
#dlg-speaker {
  color: #c090ff; font-size: .82em; letter-spacing: 2px;
  margin-bottom: 10px; text-transform: uppercase;
}
#dlg-text {
  color: #e0d4ff; font-size: .95em; line-height: 1.75;
}
#dlg-hint {
  position: absolute; bottom: 10px; right: 16px;
  color: rgba(180,150,255,.35); font-size: .72em; letter-spacing: 1px;
}

/* ── Подсказка снизу ── */
#hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(180,160,255,.35); font-size: .72em; letter-spacing: 3px;
  pointer-events: none; text-align: center;
}

/* ── Tooltip ── */
#tooltip {
  position: fixed; pointer-events: none; display: none;
  background: rgba(5,2,20,.92); border: 1px solid rgba(180,130,255,.4);
  color: #ddd0ff; padding: 7px 13px; font-size: .8em;
  z-index: 400; white-space: nowrap; letter-spacing: .5px;
}

/* ── Загрузочный экран ── */
#loading {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000; transition: opacity .7s;
}
.l-title { color: #e8d5b0; font-size: 1.6em; letter-spacing: 6px; margin-bottom: 8px; }
.l-sub   { color: rgba(200,160,100,.45); font-size: .72em; letter-spacing: 7px; }
.l-bar   { width: 200px; height: 1px; background: rgba(255,255,255,.08); margin-top: 28px; overflow: hidden; }
.l-fill  { width: 0; height: 100%; background: rgba(180,140,255,.7); animation: loadfill .9s ease .3s forwards; }
@keyframes loadfill { to { width: 100%; } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD: заголовок и кнопка назад -->
<div id="hud">
  <div id="loc-title">ФИЛОСОФСКИЙ ДЕТЕКТИВ</div>
  <button id="back-btn" onclick="PhiloGame.goBack()">← НАЗАД</button>
</div>

<!-- Панель с информацией о направлении -->
<div id="info-panel">
  <button id="panel-close" onclick="PhiloGame.closePanel()">✕</button>
  <h2 id="p-title"></h2>
  <div id="p-phil"></div>
  <div id="p-desc"></div>
  <blockquote id="p-quote"></blockquote>
  <div id="p-tags"></div>
</div>

<!-- Диалоговое окно -->
<div id="dialog-overlay">
  <div id="dialog-box">
    <div id="dlg-icon">?</div>
    <div>
      <div id="dlg-speaker"></div>
      <div id="dlg-text"></div>
    </div>
    <div id="dlg-hint">КЛИКНИТЕ ДЛЯ ПРОДОЛЖЕНИЯ</div>
  </div>
</div>

<!-- Тултип при наведении -->
<div id="tooltip"></div>

<!-- Подсказка управления -->
<div id="hint">НАЖМИТЕ НА ОБЪЕКТ ДЛЯ ВЗАИМОДЕЙСТВИЯ</div>

<!-- Экран загрузки -->
<div id="loading">
  <div class="l-title">ФИЛОСОФСКИЙ ДЕТЕКТИВ</div>
  <div class="l-sub">ИСТОРИЯ ЗАПАДНОЙ МЫСЛИ</div>
  <div class="l-bar"><div class="l-fill"></div></div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     СКРИПТЫ — порядок важен!
     1. three.min.js  — 3D-движок
     2. engine.js     — игровой движок
     3. stages/*.js   — этапы команды
     4. PhiloGame.start() — запуск

     Чтобы добавить свой этап:
       <script src="stages/stage_ancient.js"></script>
     (добавь ПЕРЕД строкой с PhiloGame.start())
     ═══════════════════════════════════════════════════════════ -->

<script src="three.min.js"></script>
<script src="engine.js"></script>

<!-- ЭТАПЫ КОМАНДЫ — каждый добавляет свою строку сюда -->
<script src="stages/stage_modern.js"></script>
<!-- <script src="stages/stage_ancient.js"></script> -->
<!-- <script src="stages/stage_medieval.js"></script> -->
<!-- <script src="stages/stage_renaissance.js"></script> -->

<script>PhiloGame.start();</script>
</body>
</html>
