<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ФИЛОСОФСКИЙ ДЕТЕКТИВ — История западной мысли</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
button { cursor:pointer; font-family:inherit; }

body {
  min-height:100%;
  background-color: #e8dfc0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,.018) 28px, rgba(0,0,0,.018) 29px),
    repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(0,0,0,.012) 28px, rgba(0,0,0,.012) 29px);
  color: #1a1208;
  font-family: Georgia, 'Times New Roman', serif;
  padding-bottom: 60px;
}

/* ── Шапка газеты ── */
.newspaper-header {
  text-align: center;
  padding: 28px 32px 18px;
  border-bottom: 3px double #5a3a10;
}
.paper-pretitle {
  font-size: .65em; letter-spacing: 6px; color: #7a4a18;
  text-transform: uppercase; margin-bottom: 8px;
}
.paper-title {
  font-size: 3em; color: #1a1208; letter-spacing: 4px;
  line-height: 1; font-weight: bold; margin-bottom: 8px;
}
.paper-subtitle {
  font-size: .7em; letter-spacing: 4px; color: #5a3a10;
  border-top: 1px solid #9a6a30; border-bottom: 1px solid #9a6a30;
  padding: 5px 0; margin: 0 auto; max-width: 600px;
}
.paper-tagline {
  font-size: .72em; color: #6a4820; margin-top: 10px;
  font-style: italic;
}

/* ── Раздел ── */
.section-rule {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 32px 0; max-width: 1100px; margin: 0 auto;
}
.section-rule::before, .section-rule::after {
  content: ''; flex: 1; height: 1px; background: #9a7040;
}
.section-label {
  font-size: .6em; letter-spacing: 4px; color: #7a5020;
  white-space: nowrap; text-transform: uppercase;
}

/* ── Временна́я шкала ── */
.timeline-wrap {
  max-width: 1100px; margin: 24px auto 0; padding: 0 32px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.timeline-wrap::-webkit-scrollbar { height: 4px; }
.timeline-wrap::-webkit-scrollbar-track { background: rgba(150,100,40,.1); }
.timeline-wrap::-webkit-scrollbar-thumb { background: rgba(150,100,40,.3); border-radius: 2px; }

.timeline-inner {
  position: relative;
  display: flex;
  align-items: flex-start;
  padding: 48px 20px 56px;
  min-width: 800px;
  gap: 0;
}

/* Горизонтальная линия через всю шкалу */
.timeline-inner::before {
  content: '';
  position: absolute;
  top: 88px; /* выравнивание по центру точек */
  left: 20px; right: 20px;
  height: 2px;
  background: linear-gradient(to right, #9a7040, #c8a860, #9a7040);
}

/* ── Узел эпохи ── */
.epoch-node {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  min-width: 120px;
}

.epoch-year {
  font-size: .64em; letter-spacing: 1px; color: #8a6040;
  margin-bottom: 10px; text-align: center;
  height: 18px;
}

.epoch-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid #9a7040;
  background: #d9cb9e;
  position: relative; z-index: 1;
  transition: transform .2s;
  flex-shrink: 0;
}
.epoch-node.available .epoch-dot {
  width: 22px; height: 22px;
  background: #2a4a20;
  border-color: #c8a840;
  box-shadow: 0 0 0 4px rgba(200,168,64,.25);
}
.epoch-node.locked .epoch-dot {
  background: #c8b880;
  border-color: #b09060;
}

.epoch-name {
  margin-top: 12px;
  font-size: .8em; font-weight: bold; color: #1a1208;
  text-align: center; line-height: 1.3;
}
.epoch-node.locked .epoch-name { color: #8a6a48; }

.epoch-period {
  font-size: .62em; color: #9a7050;
  text-align: center; margin-top: 4px; line-height: 1.4;
}

.epoch-badge {
  margin-top: 10px;
  font-size: .62em; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 2px;
  text-align: center;
}
.epoch-badge.available {
  background: #2a4a20; color: #d8f0c0;
  cursor: pointer; transition: background .2s;
}
.epoch-badge.available:hover { background: #3a6030; }
.epoch-badge.wip {
  color: #9a7050; border: 1px solid #c0a070;
  background: rgba(180,140,60,.08);
}

/* Линия-коннектор между доступной эпохой и флажком */
.epoch-node.available .epoch-dot::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 50%; transform: translateX(-50%);
  width: 2px; height: 6px;
  background: #2a4a20;
}

/* ── Карточки эпох (под шкалой) ── */
.epochs-section { max-width: 1100px; margin: 28px auto 0; padding: 0 32px; }

.epochs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin-top: 16px;
}

.epoch-card {
  border: 1.5px solid #9a7040;
  background: rgba(255,252,240,.8);
  padding: 18px 20px;
  position: relative;
  transition: all .18s;
}
.epoch-card.available {
  cursor: pointer;
  border-color: #6a8040;
  background: rgba(235,248,220,.8);
}
.epoch-card.available:hover {
  transform: translateY(-2px);
  box-shadow: 2px 4px 0 rgba(60,80,30,.15);
  background: rgba(220,240,200,.9);
}
.epoch-card.locked {
  opacity: .72;
}

.card-num {
  font-size: .58em; letter-spacing: 3px; color: #9a7050;
  text-transform: uppercase; margin-bottom: 6px;
}
.card-name {
  font-size: 1.1em; font-weight: bold; color: #1a1208;
  margin-bottom: 4px; line-height: 1.2;
}
.card-period {
  font-size: .72em; color: #7a5030; margin-bottom: 12px; font-style: italic;
}
.card-desc {
  font-size: .78em; color: #4a3020; line-height: 1.6; margin-bottom: 14px;
}
.card-status {
  font-size: .68em; letter-spacing: 1px; padding: 3px 10px;
  border-radius: 2px; display: inline-block;
}
.card-status.available { background: #2a4a20; color: #d8f0c0; }
.card-status.wip       { color: #8a5020; border: 1px solid #b09050; }

.card-arrow {
  position: absolute; top: 18px; right: 18px;
  font-size: 1.1em; color: #5a8030; opacity: 0;
  transition: opacity .2s;
}
.epoch-card.available:hover .card-arrow { opacity: 1; }

/* ── Подвал ── */
.footer {
  max-width: 1100px; margin: 40px auto 0; padding: 0 32px;
  border-top: 1px solid #9a7040;
  padding-top: 16px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.footer-note { font-size: .65em; color: #9a7050; letter-spacing: 1px; font-style: italic; }
.footer-link { font-size: .65em; color: #6a4820; letter-spacing: 1px; }
.footer-link a { color: #6a4820; }

@media (max-width: 640px) {
  .paper-title { font-size: 2em; }
  .section-rule, .timeline-wrap, .epochs-section { padding: 0 16px; }
  .section-rule { padding-top: 16px; }
  .epochs-grid { grid-template-columns: 1fr; }
  .footer { padding: 16px; }
}

/* ── Модалка «В разработке» ── */
.wip-toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #2a1208; color: #f5e6c0;
  padding: 12px 24px; font-size: .82em; letter-spacing: 1px;
  border: 1px solid #9a7040;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
  white-space: nowrap;
  z-index: 100;
}
.wip-toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="newspaper-header">
  <div class="paper-pretitle">Образовательная игра</div>
  <div class="paper-title">ФИЛОСОФСКИЙ ДЕТЕКТИВ</div>
  <div class="paper-subtitle">ИСТОРИЯ ЗАПАДНОЙ МЫСЛИ · VI ВЕК ДО Н.Э. — XX ВЕК</div>
  <div class="paper-tagline">Выберите эпоху для исследования</div>
</div>

<div class="section-rule"><span class="section-label">Хронология</span></div>

<!-- Временна́я шкала -->
<div class="timeline-wrap">
  <div class="timeline-inner" id="timeline"></div>
</div>

<div class="section-rule"><span class="section-label">Эпохи</span></div>

<!-- Карточки -->
<div class="epochs-section">
  <div class="epochs-grid" id="epochs-grid"></div>
</div>

<div class="footer">
  <div class="footer-note">Герман О.Н. «История философии», ТУСУР, 2021</div>
  <div class="footer-link"><a href="https://github.com/her1on/philosophy-game" target="_blank">GitHub →</a></div>
</div>

<div class="wip-toast" id="wip-toast">Эта локация ещё в разработке</div>

<script>
const EPOCHS = [
  {
    id: 'east',
    name: 'Древний Восток',
    period: 'до VI в. до н.э.',
    year: 'до VI в.',
    desc: 'Философия Древней Индии, Китая и Ближнего Востока. Веды, упанишады, даосизм, конфуцианство.',
    available: false,
  },
  {
    id: 'ancient',
    name: 'Античность',
    period: 'VI в. до н.э. — V в. н.э.',
    year: 'VI в. до н.э.',
    desc: 'От досократиков до неоплатонизма. Сократ, Платон, Аристотель, стоики, эпикурейцы.',
    available: false,
  },
  {
    id: 'medieval',
    name: 'Средневековье',
    period: 'V — XIV вв.',
    year: 'V–XIV вв.',
    desc: 'Патристика, схоластика, мистика. Августин, Фома Аквинский, Уильям Оккам.',
    available: false,
  },
  {
    id: 'renaissance',
    name: 'Возрождение',
    period: 'XIV — XVI вв.',
    year: 'XIV–XVI вв.',
    desc: 'Гуманизм, натурфилософия, социальные утопии. Эразм, Макиавелли, Бруно, Монтень.',
    available: false,
  },
  {
    id: 'newtime',
    name: 'Новое время',
    period: 'XVII — XVIII вв.',
    year: 'XVII–XVIII вв.',
    desc: 'Рационализм и эмпиризм. Декарт, Спиноза, Лейбниц, Локк, Юм, Кант.',
    available: false,
  },
  {
    id: 'german',
    name: 'Немецкая классическая',
    period: 'конец XVIII — начало XIX в.',
    year: 'XVIII–XIX вв.',
    desc: 'Немецкий идеализм. Кант, Фихте, Шеллинг, Гегель, Фейербах.',
    available: false,
  },
  {
    id: 'modern',
    name: 'Новейшая западная',
    period: 'XIX — XX вв.',
    year: 'XIX–XX вв.',
    desc: 'Антисциентизм и сциентизм. Ницше, Фрейд, Хайдеггер, Витгенштейн, Деррида.',
    available: true,
    url: 'philosophia.html',
  },
];

/* ── Шкала времени ── */
function renderTimeline() {
  const tl = document.getElementById('timeline');
  EPOCHS.forEach(ep => {
    const node = document.createElement('div');
    node.className = `epoch-node ${ep.available ? 'available' : 'locked'}`;
    node.innerHTML = `
      <div class="epoch-year">${ep.year}</div>
      <div class="epoch-dot"></div>
      <div class="epoch-name">${ep.name}</div>
      <div class="epoch-period">${ep.period}</div>
      <div class="epoch-badge ${ep.available ? 'available' : 'wip'}">${ep.available ? 'Изучить →' : 'Скоро'}</div>`;
    if (ep.available) {
      node.querySelector('.epoch-badge').addEventListener('click', () => location.href = ep.url);
    }
    tl.appendChild(node);
  });
}

/* ── Карточки ── */
function renderCards() {
  const grid = document.getElementById('epochs-grid');
  EPOCHS.forEach((ep, i) => {
    const card = document.createElement('div');
    card.className = `epoch-card ${ep.available ? 'available' : 'locked'}`;
    card.innerHTML = `
      <div class="card-arrow">→</div>
      <div class="card-num">Эпоха ${i + 1}</div>
      <div class="card-name">${ep.name}</div>
      <div class="card-period">${ep.period}</div>
      <div class="card-desc">${ep.desc}</div>
      <span class="card-status ${ep.available ? 'available' : 'wip'}">${ep.available ? 'Открыто' : 'В разработке'}</span>`;
    if (ep.available) {
      card.addEventListener('click', () => location.href = ep.url);
    } else {
      card.addEventListener('click', showWip);
    }
    grid.appendChild(card);
  });
}

/* ── Тост «В разработке» ── */
let wipTimer = null;
function showWip() {
  const toast = document.getElementById('wip-toast');
  toast.classList.add('show');
  clearTimeout(wipTimer);
  wipTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

renderTimeline();
renderCards();
</script>
</body>
</html>
