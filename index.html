<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ФИЛОСОФИЯ — История западной мысли</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
button { cursor:pointer; font-family:inherit; }

/* ── Фон: тёмный кабинет с янтарным светом ── */
body {
  min-height: 100vh;
  background-color: #0a140d;
  background-image:
    radial-gradient(ellipse 80% 55% at 50% 0%, rgba(110,155,85,.20) 0%, transparent 65%),
    radial-gradient(ellipse 45% 65% at 12% 35%, rgba(70,115,55,.13) 0%, transparent 55%),
    radial-gradient(ellipse 35% 45% at 88% 55%, rgba(60,105,50,.10) 0%, transparent 55%);
  background-attachment: fixed;        /* свечение привязано к экрану, без ползущей полосы при скролле */
  background-repeat: no-repeat;
  color: #e8d9b0;
  font-family: Georgia, 'Times New Roman', serif;
  padding-bottom: 80px;
  overflow-x: hidden;
}

/* ── Геометрический декор (как на стене в референсе) ── */
body::before {
  content: '';
  position: fixed;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background-image:
    radial-gradient(circle at center, transparent 38%, rgba(180,140,60,.07) 39%, transparent 40%),
    radial-gradient(circle at center, transparent 55%, rgba(180,140,60,.05) 56%, transparent 57%),
    radial-gradient(circle at center, transparent 70%, rgba(180,140,60,.04) 71%, transparent 72%);
  background-size: 100% 100%;
  border: 1px solid rgba(180,140,60,.06);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  transform: rotate(15deg);
}

/* ── Анимированный фон: пыль + созвездия ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ── Hero-шапка ── */
.hero {
  position: relative;
  text-align: center;
  padding: 72px 32px 56px;
  z-index: 1;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 320px; height: 1px;
  background: linear-gradient(to right, transparent, rgba(180,140,60,.5), transparent);
}

.hero-pretitle {
  font-size: .62em;
  letter-spacing: 8px;
  color: rgba(180,140,60,.65);
  text-transform: uppercase;
  margin-bottom: 20px;
}

.hero-title {
  font-size: 3.6em;
  color: #c8a84b;
  letter-spacing: 5px;
  line-height: 1;
  font-weight: bold;
  text-shadow:
    0 0 60px rgba(180,130,40,.35),
    0 2px 4px rgba(0,0,0,.6);
  margin-bottom: 16px;
}

.hero-subtitle {
  font-size: .68em;
  letter-spacing: 5px;
  color: rgba(200,168,90,.55);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.hero-tagline {
  font-size: .82em;
  color: rgba(220,200,150,.45);
  font-style: italic;
}

/* ── Декоративный разделитель ── */
.ornament {
  text-align: center;
  color: rgba(180,140,60,.35);
  letter-spacing: 12px;
  font-size: .75em;
  margin: 0 auto;
  padding: 28px 0 20px;
  position: relative; z-index: 1;
}

/* ── Временна́я шкала ── */
.timeline-wrap {
  max-width: 1060px;
  margin: 0 auto;
  padding: 0 40px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: relative; z-index: 1;
}
.timeline-wrap::-webkit-scrollbar { height: 3px; }
.timeline-wrap::-webkit-scrollbar-track { background: rgba(180,140,60,.05); }
.timeline-wrap::-webkit-scrollbar-thumb { background: rgba(180,140,60,.2); border-radius: 2px; }

.timeline-inner {
  position: relative;
  display: flex;
  align-items: flex-start;
  padding: 44px 10px 52px;
  min-width: 760px;
  gap: 0;
}

/* Линия шкалы */
.timeline-inner::before {
  content: '';
  position: absolute;
  top: 82px;
  left: 10px; right: 10px;
  height: 1px;
  background: linear-gradient(to right,
    transparent 0%,
    rgba(180,140,60,.3) 8%,
    rgba(180,140,60,.6) 50%,
    rgba(200,160,70,.8) 88%,
    rgba(180,140,60,.3) 100%
  );
  box-shadow: 0 0 8px rgba(180,140,60,.15);
}

.epoch-node {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  min-width: 110px;
}

.epoch-year {
  font-size: .58em;
  letter-spacing: 1px;
  color: rgba(180,140,60,.5);
  margin-bottom: 8px;
  text-align: center;
  height: 16px;
}

.epoch-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(180,140,60,.4);
  background: rgba(180,140,60,.15);
  position: relative; z-index: 1;
  flex-shrink: 0;
  transition: all .2s;
}

.epoch-node.available .epoch-dot {
  width: 18px; height: 18px;
  background: #c8a84b;
  border-color: #e0c060;
  box-shadow:
    0 0 0 4px rgba(200,168,75,.15),
    0 0 16px rgba(200,168,75,.4);
}

.epoch-name {
  margin-top: 14px;
  font-size: .75em;
  font-weight: bold;
  color: rgba(200,170,100,.55);
  text-align: center;
  line-height: 1.3;
  transition: color .2s;
}
.epoch-node.available .epoch-name {
  color: #c8a84b;
}

.epoch-period {
  font-size: .58em;
  color: rgba(180,140,60,.35);
  text-align: center;
  margin-top: 4px;
  line-height: 1.4;
}

.epoch-badge {
  margin-top: 10px;
  font-size: .58em;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 1px;
  text-align: center;
  color: rgba(180,140,60,.35);
  border: 1px solid rgba(180,140,60,.15);
}
.epoch-badge.available {
  background: rgba(180,140,60,.15);
  border-color: rgba(200,160,70,.5);
  color: #c8a84b;
  cursor: pointer;
  transition: all .2s;
}
.epoch-badge.available:hover {
  background: rgba(180,140,60,.3);
  box-shadow: 0 0 12px rgba(200,160,70,.2);
}

.epoch-node:hover .epoch-dot {
  transform: scale(1.25);
  background: #c8a84b;
  border-color: #e0c060;
  box-shadow: 0 0 0 4px rgba(200,168,75,.12), 0 0 14px rgba(200,168,75,.35);
}

/* ── Секция с карточками ── */
.section-label {
  text-align: center;
  font-size: .58em;
  letter-spacing: 6px;
  color: rgba(180,140,60,.4);
  text-transform: uppercase;
  padding: 36px 0 20px;
  position: relative; z-index: 1;
}
.section-label::before, .section-label::after {
  content: '——';
  margin: 0 12px;
  opacity: .5;
}

.epochs-grid {
  max-width: 1060px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  position: relative; z-index: 1;
}

/* ── Карточки как старые письма на столе ── */
.epoch-card {
  background: linear-gradient(145deg, #e8d9b0 0%, #dccf9e 60%, #d4c490 100%);
  border: 1px solid rgba(120,90,40,.4);
  padding: 20px 22px;
  position: relative;
  transition: all .22s;
  box-shadow:
    2px 3px 12px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.15);
  color: #2a1a08;
}
/* Случайные микро-повороты — эффект разбросанных бумаг */
.epoch-card:nth-child(3n+1) { transform: rotate(-0.4deg); }
.epoch-card:nth-child(3n+2) { transform: rotate(0.3deg); }
.epoch-card:nth-child(3n+3) { transform: rotate(-0.2deg); }

.epoch-card.available {
  cursor: pointer;
  background: linear-gradient(145deg, #eee0ba 0%, #e4d5a8 60%, #d8c990 100%);
  border-color: rgba(140,100,30,.5);
}
.epoch-card.available:hover {
  transform: rotate(0deg) translateY(-4px) scale(1.01);
  box-shadow:
    4px 8px 24px rgba(0,0,0,.6),
    0 0 20px rgba(180,140,40,.15),
    inset 0 1px 0 rgba(255,255,255,.2);
}
.epoch-card.locked {
  opacity: .75;
  filter: saturate(.7);
}

/* Линейки как на старой бумаге */
.epoch-card::before {
  content: '';
  position: absolute;
  top: 52px; left: 16px; right: 16px;
  height: 1px;
  background: rgba(120,90,40,.15);
  box-shadow:
    0 28px 0 rgba(120,90,40,.1),
    0 56px 0 rgba(120,90,40,.08);
}

.card-num {
  font-size: .56em;
  letter-spacing: 3px;
  color: rgba(80,50,20,.5);
  text-transform: uppercase;
  margin-bottom: 7px;
  position: relative;
}
.card-name {
  font-size: 1.08em;
  font-weight: bold;
  color: #1a0e04;
  margin-bottom: 4px;
  line-height: 1.2;
  position: relative;
}
.card-period {
  font-size: .68em;
  color: rgba(80,50,20,.65);
  margin-bottom: 14px;
  font-style: italic;
  position: relative;
}
.card-desc {
  font-size: .76em;
  color: #3a2010;
  line-height: 1.65;
  margin-bottom: 16px;
  position: relative;
}
.card-status {
  font-size: .62em;
  letter-spacing: 1px;
  padding: 4px 12px;
  border-radius: 1px;
  display: inline-block;
  position: relative;
}
.card-status.available {
  background: rgba(40,75,30,.9);
  color: #c8e8a0;
  border: 1px solid rgba(80,100,40,.5);
}
.card-status.wip {
  color: rgba(80,50,20,.6);
  border: 1px solid rgba(120,90,40,.25);
}

.card-arrow {
  position: absolute;
  top: 18px; right: 18px;
  font-size: 1em;
  color: #8a6030;
  opacity: 0;
  transition: opacity .2s;
}
.epoch-card.available:hover .card-arrow { opacity: 1; }

/* ── Подвал ── */
.footer {
  max-width: 1060px;
  margin: 56px auto 0;
  padding: 0 40px;
  position: relative; z-index: 1;
}
.footer-line {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(180,140,60,.25), transparent);
  margin-bottom: 16px;
}
.footer-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.footer-note { font-size: .64em; color: rgba(200,170,100,.5); letter-spacing: 1px; font-style: italic; }
.footer-note b { color: rgba(210,180,100,.9); font-weight: bold; font-style: normal; }
.footer-link a { font-size: .6em; color: rgba(180,140,60,.4); letter-spacing: 1px; text-decoration: none; }
.footer-link a:hover { color: rgba(180,140,60,.7); }

/* ── Тост ── */
.wip-toast {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(20,14,6,.96);
  color: rgba(200,168,90,.8);
  padding: 11px 28px;
  font-size: .78em; letter-spacing: 2px;
  border: 1px solid rgba(180,140,60,.3);
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
  white-space: nowrap;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
}
.wip-toast.show { opacity: 1; }

/* ── Модальное окно-превью эпохи ── */
#epoch-modal {
  position: fixed; inset: 0; z-index: 300;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0);
  transition: background .35s ease;
}
#epoch-modal.shown { background: rgba(4,8,5,.72); }
#epoch-modal.hidden { display: none; }
.em-box {
  position: relative;
  width: 100%; max-width: 660px;
  background:
    radial-gradient(ellipse 90% 70% at 50% 0%, rgba(60,105,50,.22), transparent 70%),
    #0c150e;
  border: 1.5px solid rgba(200,168,75,.55);
  box-shadow: 0 24px 70px rgba(0,0,0,.7), 0 0 0 1px rgba(0,0,0,.4);
  padding: 30px 34px 32px;
  text-align: center;
  transform: translateY(28px) scale(.97); opacity: 0;
}
#epoch-modal.shown .em-box { animation: emIn .4s cubic-bezier(.2,.8,.25,1) forwards; }
@keyframes emIn { to { transform: translateY(0) scale(1); opacity: 1; } }
.em-close {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none; color: rgba(200,168,90,.5);
  font-size: 1.1em; line-height: 1; padding: 6px; transition: color .2s;
}
.em-close:hover { color: #c8a84b; }
.em-label {
  font-size: .58em; letter-spacing: 5px; text-transform: uppercase;
  color: rgba(180,140,60,.6); margin-bottom: 10px;
}
.em-title {
  font-size: 1.9em; color: #c8a84b; font-weight: bold; letter-spacing: 1px;
  line-height: 1.1; margin-bottom: 6px;
  text-shadow: 0 0 40px rgba(180,130,40,.3);
}
.em-period {
  font-size: .72em; color: rgba(200,170,100,.6); font-style: italic;
  margin-bottom: 24px;
}
.em-figures {
  display: flex; justify-content: center; gap: 26px;
  margin-bottom: 24px; flex-wrap: wrap;
}
.em-fig { width: 96px; }
.em-fig-portrait {
  width: 84px; height: 84px; margin: 0 auto 9px;
  border-radius: 50%; border: 2px solid rgba(200,168,75,.55);
  background: linear-gradient(145deg, #2a3a24, #16210f);
  object-fit: cover; object-position: top center;
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
}
.em-fig-name { font-size: .72em; color: #e8d9b0; font-weight: bold; line-height: 1.2; margin-bottom: 3px; }
.em-fig-note { font-size: .6em; color: rgba(200,170,100,.55); font-style: italic; }
.em-about {
  font-size: .82em; color: rgba(225,210,170,.82); line-height: 1.75;
  text-align: left; margin-bottom: 26px;
  padding: 16px 18px; border-left: 2px solid rgba(200,168,75,.4);
  background: rgba(200,168,75,.05);
}
.em-cta {
  background: #2a4a20; border: 1px solid rgba(120,180,90,.4); color: #d8f0c0;
  padding: 12px 30px; font-size: .82em; letter-spacing: 2px;
  transition: all .2s;
}
.em-cta:hover { background: #3a6030; box-shadow: 0 0 18px rgba(120,180,90,.25); }

@media (max-width: 640px) {
  .hero-title { font-size: 2.2em; }
  .timeline-wrap, .epochs-grid, .footer { padding: 0 20px; }
  .epochs-grid { grid-template-columns: 1fr; }
  .epoch-card:nth-child(n) { transform: none; }
  .em-box { padding: 26px 20px 26px; }
  .em-figures { gap: 16px; }
  .em-fig { width: 80px; }
  .em-fig-portrait { width: 68px; height: 68px; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- Hero -->
<div class="hero">
  <div class="hero-pretitle">Образовательная игра</div>
  <div class="hero-title">ФИЛОСОФИЯ</div>
  <div class="hero-subtitle">История западной мысли · VI век до н.э. — XX век</div>
  <div class="hero-tagline">Выберите эпоху для исследования</div>
</div>

<div class="ornament">· · · ✦ · · ·</div>

<!-- Шкала -->
<div class="timeline-wrap">
  <div class="timeline-inner" id="timeline"></div>
</div>

<div class="section-label">Эпохи</div>

<!-- Карточки -->
<div class="epochs-grid" id="epochs-grid"></div>

<!-- Подвал -->
<div class="footer">
  <div class="footer-line"></div>
  <div class="footer-inner">
    <div class="footer-note">Создано по курсу <b>Герман О.Н.</b> · ТУСУР · 2026</div>
    <div class="footer-link"><a href="https://github.com/her1on/philosophy-game" target="_blank">GitHub →</a></div>
  </div>
</div>

<div class="wip-toast" id="wip-toast">Эта локация ещё в разработке</div>

<!-- Модальное окно-превью эпохи -->
<div id="epoch-modal" class="hidden">
  <div class="em-box">
    <button class="em-close" onclick="closeEpochModal()">✕</button>
    <div class="em-label" id="em-label">Эпоха</div>
    <div class="em-title" id="em-title"></div>
    <div class="em-period" id="em-period"></div>
    <div class="em-figures" id="em-figures"></div>
    <div class="em-about" id="em-about"></div>
    <button class="em-cta" id="em-cta">Изучить эпоху →</button>
  </div>
</div>

<script>
const EPOCHS = [
  {
    id: 'ancient',
    name: 'Античность',
    period: 'VI в. до н.э. — V в. н.э.',
    year: 'VI в. до н.э.',
    desc: 'От досократиков до неоплатонизма. Сократ, Платон, Аристотель, стоики, эпикурейцы.',
    figures: 'Сократ · Платон · Аристотель',
    available: true,
    url: 'ancient/index.html',
  },
  {
    id: 'medieval',
    name: 'Средневековье',
    period: 'V — XIV вв.',
    year: 'V–XIV вв.',
    desc: 'Патристика, схоластика, мистика. Августин, Фома Аквинский, Уильям Оккам.',
    figures: 'Августин · Фома Аквинский · Оккам',
    available: true,
    url: 'https://medieval-philosophy-server.onrender.com/philosophia.html',
  },
  {
    id: 'newtime',
    name: 'Новое время',
    period: 'XVII — XVIII вв.',
    year: 'XVII–XVIII вв.',
    desc: 'Рационализм и эмпиризм. Декарт, Спиноза, Лейбниц, Локк, Юм, Кант.',
    figures: 'Декарт · Спиноза · Локк · Юм',
    available: true,
    url: 'newtime.html',
  },
  {
    id: 'modern',
    name: 'Новейшая западная',
    period: 'XIX — XX вв.',
    year: 'XIX–XX вв.',
    desc: 'Антисциентизм и сциентизм. Ницше, Фрейд, Хайдеггер, Витгенштейн, Деррида.',
    figures: 'Ницше · Фрейд · Хайдеггер · Сартр',
    available: true,
    url: 'philosophia.html',
    preview: {
      figures: [
        { id: 'nietzsche', name: 'Ф. Ницше',  note: 'Философия жизни' },
        { id: 'freud',     name: 'З. Фрейд',   note: 'Психоанализ' },
        { id: 'sartre',    name: 'Ж.-П. Сартр', note: 'Экзистенциализм' },
      ],
      about: 'Философы XIX–XX веков пошли двумя путями. Одни верили в разум, науку и логику (позитивизм, аналитическая философия). Другие считали, что главное в человеке наука не объяснит — это инстинкты, бессознательное и личные переживания (философия жизни, психоанализ, экзистенциализм). Девять направлений, десятки мыслителей: от «Бог умер» Ницше до деконструкции Деррида.',
    },
  },
];

function renderTimeline() {
  const tl = document.getElementById('timeline');
  EPOCHS.forEach(ep => {
    const node = document.createElement('div');
    node.className = `epoch-node ${ep.available ? 'available' : 'locked'}`;
    node.innerHTML = `
      <div class="epoch-year">${ep.year}</div>
      <div class="epoch-dot"></div>
      <div class="epoch-name">${ep.name}</div>
      <div class="epoch-period">${ep.period}</div>
      <div class="epoch-badge ${ep.available ? 'available' : ''}">${ep.available ? 'Изучить →' : 'Скоро'}</div>`;
    if (ep.available) {
      node.querySelector('.epoch-badge').addEventListener('click', () => location.href = ep.url);
    }
    tl.appendChild(node);
  });
}

function renderCards() {
  const grid = document.getElementById('epochs-grid');
  EPOCHS.forEach((ep, i) => {
    const card = document.createElement('div');
    card.className = `epoch-card ${ep.available ? 'available' : 'locked'}`;
    card.innerHTML = `
      <div class="card-arrow">→</div>
      <div class="card-num">Эпоха ${i + 1}</div>
      <div class="card-name">${ep.name}</div>
      <div class="card-period">${ep.period}</div>
      <div class="card-desc">${ep.desc}</div>
      <span class="card-status ${ep.available ? 'available' : 'wip'}">${ep.available ? 'Открыто' : 'В разработке'}</span>`;
    card.addEventListener('click', () => {
      if (ep.available && ep.preview) openEpochModal(ep);
      else if (ep.available) location.href = ep.url;
      else showWip();
    });
    grid.appendChild(card);
  });
}

let wipTimer = null;
function showWip() {
  const t = document.getElementById('wip-toast');
  t.classList.add('show');
  clearTimeout(wipTimer);
  wipTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── Модальное окно-превью эпохи ── */
function openEpochModal(ep) {
  document.getElementById('em-label').textContent = 'Эпоха · ' + ep.year;
  document.getElementById('em-title').textContent = ep.name;
  document.getElementById('em-period').textContent = ep.period;
  document.getElementById('em-about').textContent = ep.preview.about;

  const figs = document.getElementById('em-figures');
  figs.innerHTML = ep.preview.figures.map(f => {
    const mono = f.name.split(' ').pop()[0];
    return `
      <div class="em-fig">
        <img class="em-fig-portrait" src="img/portraits/${f.id}.jpg" alt="${f.name}"
             onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'em-fig-portrait',style:'display:flex;align-items:center;justify-content:center;font-size:1.5em;color:#c8a84b;',textContent:'${mono}'}))">
        <div class="em-fig-name">${f.name}</div>
        <div class="em-fig-note">${f.note}</div>
      </div>`;
  }).join('');

  const cta = document.getElementById('em-cta');
  cta.onclick = () => location.href = ep.url;

  const m = document.getElementById('epoch-modal');
  m.classList.remove('hidden');
  requestAnimationFrame(() => m.classList.add('shown'));
}

function closeEpochModal() {
  const m = document.getElementById('epoch-modal');
  m.classList.remove('shown');
  setTimeout(() => m.classList.add('hidden'), 320);
}

// закрытие по клику на фон и по Esc
document.getElementById('epoch-modal').addEventListener('click', e => {
  if (e.target.id === 'epoch-modal') closeEpochModal();
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('epoch-modal').classList.contains('hidden')) closeEpochModal();
});

renderTimeline();
renderCards();

/* ── Фон: пыль в луче света + созвездия мысли ── */
(function backdrop() {
  const cv = document.getElementById('bg-canvas');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
  let parts = [];
  const mouse = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };

  function resize() {
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // плотность зависит от площади, но с потолком ради производительности
    const n = Math.min(90, Math.round(W * H / 18000));
    parts = [];
    for (let i = 0; i < n; i++) {
      parts.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.6 + 0.6,
        vy: -(Math.random() * 0.18 + 0.05),     // медленно вверх
        vx: (Math.random() - 0.5) * 0.12,        // лёгкий горизонтальный дрейф
        tw: Math.random() * Math.PI * 2,         // фаза мерцания
        tws: Math.random() * 0.018 + 0.006,      // скорость мерцания
        depth: Math.random() * 0.6 + 0.4         // для параллакса
      });
    }
  }

  const LINK = 124;     // дистанция связи в созвездие

  // падающая звезда — изредка пролетает по небу
  let star = null, lastStar = performance.now(), nextDelay = 4000 + Math.random() * 6000;
  function spawnStar() {
    const fromLeft = Math.random() < 0.5;
    const x = fromLeft ? W * (0.05 + Math.random() * 0.3) : W * (0.65 + Math.random() * 0.3);
    const y = H * (0.02 + Math.random() * 0.22);
    const dir = fromLeft ? 1 : -1;
    star = { x, y, vx: dir * (4 + Math.random() * 3), vy: 4 + Math.random() * 3 };
  }
  function drawStar() {
    const mag = Math.hypot(star.vx, star.vy) || 1;
    const tx = star.x - star.vx / mag * 150, ty = star.y - star.vy / mag * 150;
    const g = ctx.createLinearGradient(star.x, star.y, tx, ty);
    g.addColorStop(0, 'rgba(255,240,205,.9)');
    g.addColorStop(1, 'rgba(255,240,205,0)');
    ctx.strokeStyle = g; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(star.x, star.y); ctx.lineTo(tx, ty); ctx.stroke();
    const hg = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, 6);
    hg.addColorStop(0, 'rgba(255,250,228,1)');
    hg.addColorStop(1, 'rgba(255,250,228,0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(star.x, star.y, 6, 0, Math.PI * 2); ctx.fill();
  }

  function frame() {
    const now = performance.now();
    ctx.clearRect(0, 0, W, H);
    // плавное приближение параллакса к позиции курсора
    mouse.x += (mouse.tx - mouse.x) * 0.05;
    mouse.y += (mouse.ty - mouse.y) * 0.05;
    const px = (mouse.x - 0.5) * 26, py = (mouse.y - 0.5) * 26;

    for (const p of parts) {
      p.x += p.vx; p.y += p.vy; p.tw += p.tws;
      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
    }

    // линии-созвездия между близкими частицами
    for (let i = 0; i < parts.length; i++) {
      const a = parts[i];
      const ax = a.x + px * a.depth, ay = a.y + py * a.depth;
      for (let j = i + 1; j < parts.length; j++) {
        const b = parts[j];
        const bx = b.x + px * b.depth, by = b.y + py * b.depth;
        const dx = ax - bx, dy = ay - by;
        const d2 = dx * dx + dy * dy;
        if (d2 < LINK * LINK) {
          const al = (1 - Math.sqrt(d2) / LINK) * 0.16;
          ctx.strokeStyle = `rgba(200,168,75,${al})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
        }
      }
    }

    // сами пылинки
    for (const p of parts) {
      const x = p.x + px * p.depth, y = p.y + py * p.depth;
      const tw = 0.5 + 0.5 * Math.sin(p.tw);
      const a = 0.25 + tw * 0.55;
      const glow = ctx.createRadialGradient(x, y, 0, x, y, p.r * 4);
      glow.addColorStop(0, `rgba(225,195,110,${a})`);
      glow.addColorStop(1, 'rgba(225,195,110,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, y, p.r * 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(240,222,160,${a})`;
      ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2); ctx.fill();
    }

    // падающая звезда
    if (!star && now - lastStar > nextDelay) spawnStar();
    if (star) {
      star.x += star.vx; star.y += star.vy;
      drawStar();
      if (star.x < -160 || star.x > W + 160 || star.y > H + 160) {
        star = null; lastStar = now; nextDelay = 9000 + Math.random() * 9000;
      }
    }

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => {
    mouse.tx = e.clientX / window.innerWidth;
    mouse.ty = e.clientY / window.innerHeight;
  });
  resize();
  frame();
})();
</script>
</body>
