<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Средневековая философия</title>
<style>
:root {
  --ink: #2d2419;
  --muted: #6d5d48;
  --paper: #f7efd9;
  --paper-deep: #ead8ad;
  --line: #c8ae72;
  --gold: #9a6c18;
  --brown: #583a22;
  --green: #2f5d50;
  --blue: #344f6b;
  --red: #8a372f;
  --white: #fffaf0;
}

* {
  box-sizing: border-box;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  color: var(--ink);
  font-family: Georgia, "Times New Roman", serif;
  background:
    linear-gradient(rgba(45, 36, 25, 0.08), rgba(45, 36, 25, 0.08)),
    repeating-linear-gradient(90deg, rgba(88, 58, 34, 0.06) 0 1px, transparent 1px 16px),
    var(--paper);
}

a {
  color: inherit;
}

.topbar,
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px clamp(16px, 4vw, 48px);
  background: rgba(45, 36, 25, 0.92);
  color: var(--white);
}

.brand,
.topnav {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand,
.topnav a,
.text-button {
  text-decoration: none;
}

.brand-mark {
  display: inline-grid;
  place-items: center;
  width: 34px;
  height: 34px;
  border: 1px solid var(--line);
  color: var(--paper-deep);
  font-weight: 700;
}

.topnav a {
  padding: 7px 10px;
  border-bottom: 2px solid transparent;
}

.topnav a:hover {
  border-color: var(--paper-deep);
}

.nav-reset-form {
  margin: 0;
}

.nav-reset-button {
  min-height: 34px;
  padding: 7px 12px;
  border: 1px solid rgba(234, 216, 173, 0.7);
  border-radius: 6px;
  color: var(--paper-deep);
  background: rgba(255, 250, 240, 0.08);
  font-family: Arial, sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
}

.nav-reset-button:hover {
  color: var(--ink);
  background: var(--paper-deep);
}

.page {
  width: min(1120px, calc(100% - 32px));
  flex: 1;
  margin: 0 auto;
  padding: clamp(24px, 5vw, 48px) 0;
}

.intro {
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.8fr);
  gap: 28px;
  align-items: stretch;
}

.intro-text,
.rules-panel,
.walk-board,
.speaker-panel,
.question-card,
.result-panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 250, 240, 0.84);
  box-shadow: 0 12px 24px rgba(45, 36, 25, 0.12);
}

.intro-text {
  min-height: 430px;
  padding: clamp(28px, 6vw, 64px);
  background:
    linear-gradient(135deg, rgba(255, 250, 240, 0.92), rgba(234, 216, 173, 0.76)),
    radial-gradient(circle at 18% 18%, rgba(154, 108, 24, 0.18), transparent 30%);
}

.rules-panel {
  padding: 28px;
  border-left: 6px solid var(--gold);
}

.eyebrow,
.small-note {
  margin: 0 0 10px;
  color: var(--gold);
  font-family: Arial, sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  max-width: 820px;
  font-size: clamp(2rem, 4.6vw, 4rem);
  line-height: 1.05;
}

h2 {
  font-size: 1.45rem;
}

p,
li,
textarea,
label {
  font-size: 1.04rem;
  line-height: 1.58;
}

.primary-button,
.secondary-button,
.ghost-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 11px 18px;
  border-radius: 6px;
  border: 1px solid transparent;
  font-family: Arial, sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
}

.primary-button {
  color: var(--white);
  background: var(--brown);
}

.primary-button:hover {
  background: #422a18;
}

.secondary-button {
  color: var(--white);
  background: var(--green);
}

.secondary-button:hover {
  background: #24483e;
}

.ghost-button {
  color: var(--brown);
  background: transparent;
  border-color: var(--line);
}

.ghost-button:hover {
  background: rgba(154, 108, 24, 0.1);
}

.section-heading {
  margin-bottom: 20px;
}

.section-heading h1 {
  margin-bottom: 10px;
}

.walk-board {
  display: grid;
  grid-template-columns: repeat(6, minmax(120px, 1fr));
  gap: 0;
  margin-bottom: 22px;
  overflow: hidden;
}

.path-stop {
  position: relative;
  min-height: 146px;
  padding: 18px 14px;
  border-right: 1px solid rgba(200, 174, 114, 0.7);
  background: rgba(255, 250, 240, 0.5);
}

.path-stop::after {
  content: "";
  position: absolute;
  right: -16px;
  bottom: 22px;
  width: 32px;
  height: 4px;
  background: var(--line);
  z-index: 1;
}

.path-stop:last-child::after {
  display: none;
}

.path-stop p,
.path-stop strong {
  position: relative;
  z-index: 2;
}

.path-stop p {
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 0.88rem;
}

.path-stop strong {
  display: block;
  font-size: 0.95rem;
}

.mini-character,
.character {
  --robe: #583a22;
  --trim: #9a6c18;
  --accent: #344f6b;
}

.mini-character {
  position: relative;
  width: 52px;
  height: 58px;
  margin-bottom: 10px;
}

.mini-head,
.mini-body {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.mini-head {
  top: 4px;
  width: 28px;
  height: 28px;
  border: 2px solid var(--line);
  border-radius: 50%;
  background: #ead0a0;
  z-index: 2;
}

.mini-head::before,
.mini-head::after {
  content: "";
  position: absolute;
  top: 10px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink);
}

.mini-head::before {
  left: 7px;
}

.mini-head::after {
  right: 7px;
}

.mini-body {
  bottom: 0;
  width: 44px;
  height: 34px;
  border: 2px solid var(--line);
  border-radius: 20px 20px 6px 6px;
  background: var(--robe);
}

.character {
  position: relative;
  display: grid;
  place-items: center;
  width: 170px;
  height: 220px;
  margin-bottom: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 250, 240, 0.78), rgba(234, 216, 173, 0.8)),
    repeating-linear-gradient(90deg, rgba(88, 58, 34, 0.05) 0 1px, transparent 1px 16px);
  overflow: hidden;
}

.character .halo,
.character .hood,
.character .head,
.character .beard,
.character .body,
.character .book,
.character .quill {
  position: absolute;
}

.character .halo {
  top: 20px;
  width: 96px;
  height: 96px;
  border: 3px solid rgba(154, 108, 24, 0.35);
  border-radius: 50%;
}

.character .hood {
  top: 38px;
  width: 92px;
  height: 100px;
  border-radius: 48px 48px 22px 22px;
  background: var(--robe);
  box-shadow: inset 0 -10px 0 rgba(45, 36, 25, 0.18);
  z-index: 1;
}

.character .head {
  top: 54px;
  width: 56px;
  height: 62px;
  border: 2px solid rgba(88, 58, 34, 0.35);
  border-radius: 45% 45% 48% 48%;
  background: #ead0a0;
  z-index: 2;
}

.character .head::before,
.character .head::after {
  content: "";
  position: absolute;
  top: 25px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ink);
}

.character .head::before {
  left: 15px;
}

.character .head::after {
  right: 15px;
}

.character .beard {
  top: 94px;
  width: 46px;
  height: 34px;
  border-radius: 6px 6px 24px 24px;
  background: #efe6d0;
  z-index: 3;
}

.character .body {
  bottom: 18px;
  width: 126px;
  height: 96px;
  border: 2px solid rgba(88, 58, 34, 0.25);
  border-radius: 54px 54px 10px 10px;
  background:
    linear-gradient(90deg, transparent 48%, rgba(255, 250, 240, 0.35) 49% 51%, transparent 52%),
    var(--robe);
  z-index: 1;
}

.character .book {
  right: 30px;
  bottom: 40px;
  width: 48px;
  height: 34px;
  border: 2px solid rgba(88, 58, 34, 0.45);
  border-radius: 4px;
  background:
    linear-gradient(90deg, rgba(255, 250, 240, 0.9) 0 48%, rgba(88, 58, 34, 0.35) 49% 51%, rgba(255, 250, 240, 0.9) 52%),
    var(--paper);
  transform: rotate(-5deg);
  z-index: 4;
}

.character .quill {
  left: 30px;
  bottom: 55px;
  width: 6px;
  height: 46px;
  border-radius: 6px;
  background: var(--accent);
  transform: rotate(35deg);
  z-index: 4;
}

.character .quill::before {
  content: "";
  position: absolute;
  left: -11px;
  top: -18px;
  width: 22px;
  height: 34px;
  border-radius: 100% 0 100% 0;
  background: var(--accent);
}

.mentor,
.mini-character.mentor {
  --robe: #4b3726;
  --trim: #9a6c18;
  --accent: #2f5d50;
}

.augustine,
.mini-character.augustine {
  --robe: #6b3f35;
  --trim: #9a6c18;
  --accent: #344f6b;
}

.anselm,
.mini-character.anselm {
  --robe: #38495c;
  --trim: #c8ae72;
  --accent: #8a372f;
}

.abelard,
.mini-character.abelard {
  --robe: #2f5d50;
  --trim: #c8ae72;
  --accent: #9a6c18;
}

.aquinas,
.mini-character.aquinas {
  --robe: #f1e7cf;
  --trim: #583a22;
  --accent: #344f6b;
}

.aquinas .hood,
.aquinas .body {
  border-color: rgba(88, 58, 34, 0.4);
  color: var(--ink);
}

.ockham,
.mini-character.ockham {
  --robe: #3d352f;
  --trim: #c8ae72;
  --accent: #8a372f;
}

.anselm .book {
  width: 20px;
  height: 58px;
  border-radius: 12px 12px 4px 4px;
  background: var(--paper);
}

.abelard .quill {
  transform: rotate(-35deg);
}

.path-stop.done .mini-body {
  background: var(--green);
}

.path-stop.active .mini-body {
  background: var(--gold);
}

.path-stop.done {
  background: rgba(47, 93, 80, 0.12);
}

.path-stop.active {
  background: rgba(154, 108, 24, 0.18);
}

.path-stop.locked {
  opacity: 0.72;
}

.status-label {
  display: inline-flex;
  margin-top: 10px;
  color: var(--muted);
  font-family: Arial, sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
}

.approach-form {
  margin-top: 12px;
}

.approach-button {
  min-height: 34px;
  padding: 7px 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--white);
  background: var(--brown);
  font-family: Arial, sans-serif;
  font-weight: 700;
  cursor: pointer;
}

.approach-button:hover {
  background: #422a18;
}

.encounter-layout {
  display: grid;
  grid-template-columns: minmax(240px, 0.45fr) minmax(0, 1fr);
  gap: 20px;
  align-items: start;
}

.speaker-panel,
.question-card {
  padding: clamp(20px, 3vw, 30px);
}

.speaker-panel {
  position: sticky;
  top: 16px;
}

.question-meta {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
  color: var(--muted);
  font-family: Arial, sans-serif;
  font-size: 0.92rem;
}

.question-card h1 {
  font-size: clamp(1.55rem, 3vw, 2.5rem);
  line-height: 1.2;
}

.dialogue-closed,
.speech-bubble {
  padding: 18px;
  border-radius: 8px;
  background: rgba(255, 250, 240, 0.78);
  border: 1px solid rgba(88, 58, 34, 0.18);
}

.dialogue-closed h1 {
  margin-bottom: 12px;
}

.speech-bubble {
  position: relative;
  border-left: 6px solid var(--gold);
}

.speech-bubble::before {
  content: "";
  position: absolute;
  left: -16px;
  top: 28px;
  border-top: 10px solid transparent;
  border-right: 10px solid var(--gold);
  border-bottom: 10px solid transparent;
}

.speech-bubble p {
  margin-bottom: 8px;
  color: var(--gold);
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
}

.answer-form {
  display: grid;
  gap: 12px;
}

.answer-form label {
  font-weight: 700;
}

textarea {
  width: 100%;
  min-height: 180px;
  resize: vertical;
  padding: 14px;
  border: 1px solid rgba(88, 58, 34, 0.35);
  border-radius: 6px;
  color: var(--ink);
  background: rgba(255, 250, 240, 0.9);
  font-family: Georgia, "Times New Roman", serif;
}

textarea:focus {
  outline: 3px solid rgba(154, 108, 24, 0.22);
  border-color: var(--gold);
}

.form-error,
.student-answer,
.feedback {
  margin-top: 18px;
  padding: 16px;
  border-radius: 6px;
}

.form-error {
  border: 1px solid var(--red);
  background: rgba(138, 55, 47, 0.12);
  color: var(--red);
  font-family: Arial, sans-serif;
  font-weight: 700;
}

.student-answer {
  border: 1px solid rgba(88, 58, 34, 0.18);
  background: rgba(255, 250, 240, 0.75);
}

.feedback {
  border-left: 6px solid var(--blue);
  background: rgba(52, 79, 107, 0.1);
}

.feedback h2,
.student-answer h2 {
  margin-bottom: 6px;
  font-size: 1.25rem;
}

.feedback-correct {
  border-left-color: var(--green);
  background: rgba(47, 93, 80, 0.1);
}

.feedback-wrong {
  border-left-color: var(--red);
  background: rgba(138, 55, 47, 0.1);
}

.next-form {
  margin-top: 18px;
}

.result-panel {
  width: min(820px, 100%);
  margin: 0 auto;
  padding: clamp(28px, 5vw, 48px);
  text-align: center;
}

.result-panel h1 {
  margin-inline: auto;
  font-size: clamp(2rem, 4vw, 3.2rem);
}

.result-score {
  margin: 20px auto 6px;
  color: var(--brown);
  font-size: clamp(3.5rem, 10vw, 6rem);
  line-height: 1;
  font-weight: 700;
}

.recommendations,
.answer-log {
  margin-top: 28px;
  text-align: left;
}

.recommendations h2,
.answer-log h2 {
  text-align: center;
}

.log-item {
  padding: 12px 0;
  border-top: 1px solid rgba(88, 58, 34, 0.18);
}

.log-item p {
  margin-bottom: 0;
  color: var(--muted);
}

.actions-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 24px;
  flex-wrap: wrap;
}

.centered {
  justify-content: center;
}

.footer {
  justify-content: center;
  font-family: Arial, sans-serif;
  font-size: 0.9rem;
  flex-wrap: wrap;
}

.game-screen {
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) minmax(260px, 0.55fr);
  gap: 18px;
  align-items: stretch;
}

.campus-map,
.quest-panel,
.dialogue-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 250, 240, 0.84);
  box-shadow: 0 12px 24px rgba(45, 36, 25, 0.12);
}

.campus-map {
  position: relative;
  min-height: 520px;
  overflow: hidden;
  background:
    linear-gradient(rgba(247, 239, 217, 0.64), rgba(247, 239, 217, 0.64)),
    repeating-linear-gradient(0deg, rgba(88, 58, 34, 0.05) 0 1px, transparent 1px 28px),
    repeating-linear-gradient(90deg, rgba(88, 58, 34, 0.05) 0 1px, transparent 1px 28px),
    #d9c88f;
}

.map-ground {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 32% 42%, rgba(47, 93, 80, 0.2), transparent 18%),
    radial-gradient(circle at 72% 58%, rgba(52, 79, 107, 0.14), transparent 20%);
}

.map-road {
  position: absolute;
  border-radius: 999px;
  background: rgba(234, 216, 173, 0.88);
  border: 1px solid rgba(154, 108, 24, 0.28);
}

.road-main {
  left: 7%;
  right: 6%;
  top: 48%;
  height: 38px;
}

.road-top {
  left: 19%;
  top: 26%;
  width: 68%;
  height: 28px;
  transform: rotate(-10deg);
}

.road-bottom {
  left: 12%;
  top: 68%;
  width: 70%;
  height: 28px;
  transform: rotate(8deg);
}

.campus-building {
  position: absolute;
  display: grid;
  place-items: center;
  width: 126px;
  height: 82px;
  border: 2px solid rgba(88, 58, 34, 0.35);
  border-radius: 6px;
  color: var(--white);
  background: var(--brown);
  box-shadow: inset 0 -12px 0 rgba(45, 36, 25, 0.18);
  font-family: Arial, sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  text-align: center;
}

.campus-building::before {
  content: "";
  position: absolute;
  top: -22px;
  left: 10px;
  right: 10px;
  height: 38px;
  transform: skewX(-18deg);
  border: 2px solid rgba(88, 58, 34, 0.35);
  border-bottom: 0;
  border-radius: 6px 6px 0 0;
  background: var(--gold);
}

.campus-building span {
  position: relative;
  z-index: 1;
  padding-top: 16px;
}

.building-gate {
  left: 4%;
  bottom: 7%;
}

.building-monastery {
  left: 15%;
  top: 12%;
  background: #6b3f35;
}

.building-auditorium {
  left: 36%;
  bottom: 8%;
  background: #38495c;
}

.building-debate {
  left: 45%;
  top: 12%;
  background: #2f5d50;
}

.building-library {
  right: 12%;
  bottom: 12%;
  background: #6f5737;
}

.building-scriptorium {
  right: 5%;
  top: 11%;
  background: #3d352f;
}

.student-token {
  position: absolute;
  left: var(--student-x);
  top: var(--student-y);
  width: 48px;
  height: 62px;
  transform: translate(-50%, -50%);
  transition: left 650ms ease, top 650ms ease;
  z-index: 8;
}

.student-token.walking {
  animation: student-bob 0.36s ease-in-out infinite alternate;
}

.student-head,
.student-body {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.student-head {
  top: 0;
  width: 26px;
  height: 26px;
  border: 2px solid rgba(88, 58, 34, 0.45);
  border-radius: 50%;
  background: #edd4a5;
  z-index: 2;
}

.student-head::before,
.student-head::after {
  content: "";
  position: absolute;
  top: 10px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink);
}

.student-head::before {
  left: 7px;
}

.student-head::after {
  right: 7px;
}

.student-body {
  bottom: 0;
  width: 42px;
  height: 42px;
  border: 2px solid rgba(88, 58, 34, 0.35);
  border-radius: 20px 20px 8px 8px;
  background: var(--blue);
}

@keyframes student-bob {
  from {
    transform: translate(-50%, -50%);
  }
  to {
    transform: translate(-50%, -56%);
  }
}

.map-character-form {
  position: absolute;
  left: var(--char-x);
  top: var(--char-y);
  z-index: 7;
  transform: translate(-50%, -50%);
  pointer-events: auto;
}

.map-character {
  position: relative;
  display: block;
  width: 58px;
  height: 76px;
  padding: 0;
  border: 0;
  background: transparent;
  color: var(--ink);
  font-family: Georgia, "Times New Roman", serif;
}

.map-character:not(:disabled) {
  cursor: pointer;
}

.map-character .mini-head {
  width: 30px;
  height: 30px;
  border-width: 2px;
}

.map-character .mini-body {
  width: 48px;
  height: 38px;
  border-radius: 26px 26px 8px 8px;
}

.map-character.active .mini-head,
.map-character-form.active .mini-head {
  box-shadow: 0 0 0 5px rgba(154, 108, 24, 0.26);
}

.map-character-form.active .map-character {
  animation: active-pulse 1.2s ease-in-out infinite alternate;
}

.map-character-form.selected .mini-head {
  box-shadow: 0 0 0 6px rgba(154, 108, 24, 0.35);
}

.map-character-form.locked {
  opacity: 0.55;

.label-gate {

  top: 74%;

.label-monastery {

.label-auditorium {

  top: 75%;
}

.label-debate {

  top: 22%;
}

.label-library {

  top: 71%;
}

.label-scriptorium {
  left: 83%;
  top: 20%;
}

.journal-row {

.hint-counter {

.journal-badges {

.scene-card {

}

.scene-card.hint-mode::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: rgba(45, 36, 25, 0.08);
}

.scene-gate {
  background-position: 0% 0%;
}

.scene-chapel {
  background-position: 50% 0%;
}

.scene-courtyard {
  background-position: 100% 0%;
}

.scene-debate {
  background-position: 0% 100%;
}

.scene-library {
  background-position: 50% 100%;
}

.scene-scriptorium {
  background-position: 100% 100%;
}

.hint-room-card {
  aspect-ratio: 16 / 9;
  background-image: url("static/img/hint-room.png");
  background-position: center;
  background-size: cover;
}

.scene-dialogue-box {
  position: absolute;
  left: 4.8%;
  right: 4.8%;
  bottom: 5.2%;

  min-height: 28%;
  padding: clamp(14px, 2.4vw, 24px);
  border: 1px solid rgba(88, 58, 34, 0.2);
  border-radius: 8px;
  background: rgba(255, 250, 240, 0.82);
  backdrop-filter: blur(1px);
}

.scene-card.hint-mode .scene-dialogue-box {
  left: 4%;
  right: auto;
  bottom: 4%;
  width: min(470px, 58%);
  min-height: 0;
  padding: clamp(10px, 1.5vw, 15px);
}

.scene-card.hint-mode .scene-dialogue-box h1 {
  margin-bottom: 6px;

}

.scene-card.hint-mode .dialogue-line {

  font-size: 0.9rem;
}

.hidden-object-layer {
  position: absolute;
  inset: 0;
  z-index: 3;
}

.hidden-object {
  position: absolute;
  left: var(--item-x);
  top: var(--item-y);
  width: clamp(28px, calc(var(--item-size) * 0.58px), 58px);
  transform: translate(-50%, -50%) rotate(var(--item-rotate));
  margin: 0;
}

.hidden-object button {
  display: block;
  width: 100%;
  min-width: 0;
  min-height: 0;
  padding: 0;
  border: 0;
  color: inherit;
  background: transparent;
  cursor: default;
}

.hidden-object button:hover {
  outline: 0;
}

.hidden-object img {
  display: block;
  width: 100%;
  height: auto;
  filter: sepia(0.95) saturate(0.28) brightness(0.52) contrast(0.72);
  mix-blend-mode: multiply;
  opacity: 0.46;
  transition: opacity 160ms ease, filter 160ms ease;
}

.hidden-object button:focus-visible {
  outline: 2px solid rgba(234, 216, 173, 0.72);
  outline-offset: 3px;
}

.hidden-object.object-key img,
.hidden-object.object-astrolabe img,
.hidden-object.object-hourglass img,
.hidden-object.object-lantern img {
  filter: sepia(1) saturate(0.2) brightness(0.44) contrast(0.66);
  opacity: 0.38;
}

.hidden-object.object-seal img,
.hidden-object.object-ring img {
  filter: sepia(1) saturate(0.18) brightness(0.42) contrast(0.62);
  opacity: 0.36;
}

.hidden-object.object-quill img,
.hidden-object.object-scroll img {
  filter: sepia(1) saturate(0.18) brightness(0.58) contrast(0.62);
  opacity: 0.42;
}

.hidden-object.object-book img {
  filter: sepia(1) saturate(0.24) brightness(0.46) contrast(0.64);
  opacity: 0.34;
}

.hidden-object.found button {
  cursor: default;
}

.hidden-object.found img {
  opacity: 0.25;
  filter: grayscale(1) drop-shadow(0 3px 5px rgba(20, 14, 9, 0.25));
}

.scene-meta,
.dialogue-speaker {
  font-family: Arial, sans-serif;

  font-weight: 700;
  text-transform: uppercase;
}

.scene-meta {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
  font-size: 0.78rem;
}

.dialogue-speaker {
  margin-bottom: 4px;
  font-size: 0.86rem;
}

.scene-dialogue-box h1 {

}

.dialogue-line {

}

.verdict-card {
  display: flex;

  background: rgba(255, 250, 240, 0.76);

}

.verdict-success {
  border-left: 6px solid var(--green);
}

.verdict-retry {
  border-left: 6px solid var(--gold);
}

.verdict-seal {
  display: grid;
  flex: 0 0 auto;
  place-items: center;
  width: 54px;
  height: 54px;
  border: 2px solid rgba(88, 58, 34, 0.28);
  border-radius: 50%;
  color: var(--white);
  background:
    radial-gradient(circle at 34% 30%, rgba(255, 250, 240, 0.24), transparent 28%),
    var(--brown);
  box-shadow: 0 6px 12px rgba(45, 36, 25, 0.22);
  font-family: Arial, sans-serif;
  font-size: 1.55rem;
  font-weight: 800;
  transform: rotate(-8deg);

}

.verdict-card p {

}

.verdict-card .eyebrow {
  margin-bottom: 4px;
}

.idea-strip,
.margin-note {
  display: flex;
  align-items: center;
  flex-wrap: wrap;

}

  font-weight: 700;
}

.margin-note span {
  background: rgba(154, 108, 24, 0.16);

@keyframes verdict-stamp {

    opacity: 0;

  to {

  }

.dialogue-actions {

.hidden-progress {

  padding: 6px 10px;
  border-radius: 999px;
  color: var(--white);
  background: var(--brown);
  font-family: Arial, sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
}

.hidden-targets {

  align-items: center;
  gap: 10px;
  margin: 10px 0;
  padding: 8px 10px;

  border-radius: 6px;
  background: rgba(255, 250, 240, 0.72);
}

.hidden-targets strong {

  font-family: Arial, sans-serif;
  font-size: 0.82rem;

}

.hidden-targets ul {

.hidden-targets li {

  padding: 3px 7px 3px 4px;

.hidden-targets img {

.hint-box,
.hint-request {

.hint-box strong {

.scene-answer-form {

.scene-answer-form textarea {

@media (max-width: 980px) {
  .game-screen {
    grid-template-columns: 1fr;
  }

  .campus-map {
    min-height: 470px;
  }

  .quest-panel {
    display: grid;
    grid-template-columns: 170px 1fr;
    column-gap: 18px;
    align-items: center;
  }

  .quest-panel .character {
    grid-row: 1 / span 4;

  .walk-board {

  .path-stop:nth-child(3)::after {

  .speaker-panel {
    position: static;
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 18px;
  }

  .speaker-panel .eyebrow,
  .speaker-panel h2,

  .character {
    grid-row: 1 / span 4;
  }

    height: 34px;

    width: 112px;

  .talk-hint {

  .quest-panel {

  }

  .map-journal .journal-list {

  .path-stop {

  .character {

  .character .halo,

  .actions-row {
    align-items: stretch;
    flex-direction: column;
  }

  .primary-button,
  .secondary-button,
  .ghost-button {
    width: 100%;

  const na = normalizeText(text);
  const matched=[], missing=[];
  for(const g of (enc.keywords||[])){
    const ok = (g.variants||[]).some(v => na.indexOf(normalizeText(v)) !== -1);
    (ok?matched:missing).push(g.label);
  }
  const min = enc.min_keywords||1;
  return {isCorrect: matched.length>=min, matched, missing, needed:min, total:(enc.keywords||[]).length};
}

function calcPercent(c,a){ return a===0?0:Math.round(c/a*100); }
function calcTitle(p){ if(p<=40)return 'Начинающий ученик'; if(p<=70)return 'Студент средневекового университета'; if(p<=90)return 'Магистр философии'; return 'Мудрец схоластики'; }

/* ── действия (порт маршрутов app.py) ── */
function startGame(){ state = fresh(); state.started=true; save(); openGame(); }
function resetGame(){ state = fresh(); save(); renderFooter(); renderIndex(); show('index'); }

function approach(id){
  const e = encById(id); if(!e) return;
  state.currentId=e.id; state.mode='philosopher'; state.metSpeaker=true; state.phase='greeting';
  state.playerX=e.entry_target_x; state.playerY=e.entry_target_y;
  state.hintReturnPhase=null; state.feedback=null; state.formError=null;
  save(); openGame(true);
}
function hintLocation(id){
  const e = encById(id); if(!e) return;
  if(state.completedIds.indexOf(e.id)!==-1){ state.currentId=e.id; state.mode='philosopher'; state.metSpeaker=true; state.phase='greeting'; save(); openGame(true); return; }
  state.currentId=e.id; state.mode='hint'; state.metSpeaker=false;
  state.playerX=e.entry_target_x; state.playerY=e.entry_target_y; state.feedback=null;
  if(state.hintIds.indexOf(e.id)!==-1){ state.phase='hint_done'; }
  else { if(!state.hintFound[e.id]) state.hintFound[e.id]=[]; state.hintReturnPhase='hint_location'; state.phase='hint'; }
  save(); openGame(true);
}
function askQuestion(){ if(state.currentId){ state.phase='question'; state.formError=null; save(); openGame(true); } }
function findObject(encId, objId){
  if(state.currentId!==encId || state.phase!=='hint') return;
  const e = encById(encId); if(!e) return;
  const allowed = (e.hint_objects||[]).map(o=>o.id);
  if(allowed.indexOf(objId)===-1) return;
  if(state.hintIds.indexOf(encId)!==-1) return;
  if(!state.hintFound[encId]) state.hintFound[encId]=[];
  const found = state.hintFound[encId];
  if(found.indexOf(objId)===-1) found.push(objId);
  if(found.length>=allowed.length){
    if(state.hintIds.indexOf(encId)===-1) state.hintIds.push(encId);
    let rp = state.hintReturnPhase||'question'; state.hintReturnPhase=null;
    if(rp==='hint_location'){ state.mode='hint'; state.metSpeaker=false; state.phase='hint_done'; }
    else { if(rp!=='greeting'&&rp!=='question') rp='greeting'; state.mode='philosopher'; state.metSpeaker=true; state.phase=rp; }
  }
  save(); openGame(true);
}
function submitAnswer(text){
  const e = encById(state.currentId); if(!e) return;
  if(state.phase!=='question') return;
  if(state.completedIds.indexOf(e.id)!==-1) return;
  const answer = (text||'').trim();
  if(answer.length<20){ state.formError='Ответ должен быть развернутым: напишите хотя бы одно-два предложения.'; save(); openGame(true); return; }
  state.formError=null;
  const ev = evaluateAnswer(answer, e);
  if(ev.isCorrect){ state.score+=POINTS; state.correct++; }
  else { state.mistakes.push(e.recommendation); }
  state.answered++;
  if(state.completedIds.indexOf(e.id)===-1) state.completedIds.push(e.id);
  state.answerLog.push({encounter_id:e.id, speaker:e.speaker, topic:e.topic, answer:answer, is_correct:ev.isCorrect, matched:ev.matched});
  state.feedback={encounter_id:e.id, is_correct:ev.isCorrect, matched:ev.matched, missing:ev.missing, needed:ev.needed, total:ev.total, explanation:e.explanation};
  save(); openGame(true);
}
function closeDialogue(){
  state.currentId=null; state.mode='none'; state.metSpeaker=false; state.phase='none';
  state.hintReturnPhase=null; state.feedback=null; state.formError=null; save();
  if(state.completedIds.length>=ENCOUNTERS.length){ renderFinal(); show('final'); }
  else openGame();
}

      (fb.is_correct?'Философ ставит печать на ваш пергамент: главные идеи эпохи распознаны.':'Философ не отвергает ответ, но оставляет пометку: мысль нужно точнее связать с темой.')+'</p></div></div>';

/* ── интерактив карты (порт game.js) ── */
function moveStudent(x,y,msg){
  const st = document.querySelector('[data-student]');
  const status = document.querySelector('[data-map-status]');
  if(st){ st.style.setProperty('--student-x',x+'%'); st.style.setProperty('--student-y',y+'%'); st.classList.add('walking');
    setTimeout(()=>st.classList.remove('walking'),700); }
  if(status && msg) status.textContent = msg;
  state.playerX=x; state.playerY=y;
}
function wireGame(){
  const map = document.querySelector('[data-campus-map]');
  const markers = document.querySelectorAll('[data-marker]');
  const choiceCard = document.querySelector('[data-choice-card]');
  const travelForm = document.querySelector('[data-travel-form]');
  let pending = null; // {kind,id}

  function selectMarker(m){
    markers.forEach(x=>x.classList.remove('selected'));
    m.classList.add('selected');
    if(choiceCard && travelForm){
      choiceCard.hidden=false;
      choiceCard.querySelector('[data-choice-role]').textContent=m.dataset.role;
      choiceCard.querySelector('[data-choice-title]').textContent=m.dataset.title;
      choiceCard.querySelector('[data-choice-meta]').textContent=m.dataset.meta;
      choiceCard.querySelector('[data-choice-topic]').textContent=m.dataset.topic;
      choiceCard.querySelector('[data-choice-button]').textContent=m.dataset.label;
      pending={kind:m.dataset.kind, id:m.dataset.id, tx:Number(m.dataset.tx), ty:Number(m.dataset.ty)};
    }
    const status=document.querySelector('[data-map-status]');
    if(status) status.textContent = (m.dataset.kind==='hint'?'Выбрано место подсказки: ':'Выбран философ: ')+m.dataset.title+'.';
  }
  if(map){
    map.addEventListener('click',ev=>{
      if(ev.target.closest('.map-character-form, .map-location-hotspot, button, a, textarea, .map-choice-card')) return;
      const r=map.getBoundingClientRect();
      const x=((ev.clientX-r.left)/r.width)*100, y=((ev.clientY-r.top)/r.height)*100;
      moveStudent(Math.max(3,Math.min(97,x)), Math.max(5,Math.min(95,y)), 'Ученик идет...');
      save();
    });
  }
  markers.forEach(m=>m.addEventListener('click',()=>selectMarker(m)));
  if(travelForm){
    travelForm.addEventListener('submit',ev=>{ ev.preventDefault(); if(!pending) return;
      moveStudent(pending.tx, pending.ty, 'Ученик идет к выбранной точке...');
      const p=pending; setTimeout(()=>{ if(p.kind==='hint') hintLocation(p.id); else approach(p.id); }, 720);
    });
  }
  // диалоговые кнопки
  const sg=document.getElementById('screen-game');
  sg.querySelectorAll('[data-ask]').forEach(b=>b.onclick=()=>askQuestion());
  sg.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closeDialogue());
  sg.querySelectorAll('[data-approach]').forEach(b=>b.onclick=()=>approach(b.dataset.approach));
  sg.querySelectorAll('[data-find]').forEach(f=>f.addEventListener('submit',ev=>{ev.preventDefault(); findObject(f.dataset.enc, f.dataset.obj);}));
  const af=sg.querySelector('[data-answer-form]');
  if(af) af.addEventListener('submit',ev=>{ev.preventDefault(); submitAnswer(af.querySelector('textarea').value);});
}

/* ── экран: финал ── */
function renderFinal(){
  const percent=calcPercent(state.correct,state.answered);
  let recs = state.mistakes.filter((v,i,a)=>a.indexOf(v)===i);
  if(!recs.length && state.answered>0) recs=['Материал усвоен хорошо. Для закрепления попробуйте открыть карту заново и пройти философов в другом порядке.'];
  else if(state.answered===0) recs=['Откройте карту и поговорите хотя бы с одним философом.'];
  let recLi=''; recs.forEach(r=>recLi+='<li>'+esc(r)+'</li>');
  let log='';
  if(state.answerLog.length){
    let items=''; state.answerLog.forEach(it=>{ items+='<article class="log-item"><strong>'+esc(it.speaker)+': '+esc(it.topic)+'</strong><p>'+(it.is_correct?'Засчитано':'Не засчитано')+'</p></article>'; });
    log='<div class="answer-log"><h2>Ваш маршрут</h2>'+items+'</div>';
  }
  document.getElementById('screen-final').innerHTML=
  '<section class="result-panel final-panel">'+
    '<p class="eyebrow">Маршрут завершен</p>'+
    '<h1>'+esc(calcTitle(percent))+'</h1>'+
    '<div class="result-score">'+percent+'%</div>'+
    '<p>Баллы: '+state.score+'. Засчитано ответов: '+state.correct+' из '+state.answered+'.</p>'+
    '<p>Пройдено встреч: '+state.answered+' из '+ENCOUNTERS.length+'.</p>'+
    '<div class="recommendations"><h2>Что повторить</h2><ul>'+recLi+'</ul></div>'+
    log+
    '<div class="actions-row centered"><button class="secondary-button" data-go="game">Вернуться к маршруту</button><button class="ghost-button" data-reset-final>Начать заново</button></div>'+
  '</section>';
  document.querySelectorAll('#screen-final [data-go="game"]').forEach(b=>b.onclick=()=>{openGame();});
  document.querySelectorAll('#screen-final [data-reset-final]').forEach(b=>b.onclick=()=>resetGame());
}

/* ── глобальные обработчики навигации ── */
document.addEventListener('click', ev=>{
  const go = ev.target.closest('[data-go]');
  if(go){ ev.preventDefault(); const t=go.dataset.go; if(t==='game'){ if(!state.started){startGame();} else openGame(); } else if(t==='final'){ renderFinal(); show('final'); } else { renderIndex(); show('index'); } return; }
  const start = ev.target.closest('[data-start]');
  if(start){ ev.preventDefault(); startGame(); return; }
});
document.addEventListener('submit', ev=>{
  if(ev.target.matches('[data-reset]')){ ev.preventDefault(); resetGame(); }
});

/* ── старт ── */
renderIndex(); renderFooter();
if(state.started){ renderGame(); show('game'); } else { show('index'); }
</script>
