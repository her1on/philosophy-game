<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#030c18;overflow:hidden;font-family:Georgia,serif;color:#e0eeff;width:100vw;height:100vh}
#scene-bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;will-change:transform;transform:scale(1.04)}
#embers{position:fixed;inset:0;pointer-events:none;z-index:5}
.torch-fx{position:fixed;pointer-events:none;z-index:6;transform:translate(-50%,-100%)}
.torch-glow-anim{position:absolute;top:50%;left:50%;width:160px;height:160px;transform:translate(-50%,-5%);
  background:radial-gradient(circle,rgba(240,190,70,.35) 0%,transparent 68%);border-radius:50%;animation:glow-p 1.7s ease-in-out infinite}
.flame-outer{position:relative;width:22px;height:40px;margin:0 auto;
  background:radial-gradient(ellipse at 50% 68%,#fff8e0 0%,#f8d040 26%,#e08010 60%,transparent 90%);
  border-radius:50% 50% 38% 38%/62% 62% 45% 45%;filter:blur(1.8px);animation:flick .48s ease-in-out infinite;transform-origin:50% 100%}
.flame-inner{position:absolute;bottom:5px;left:50%;width:11px;height:22px;transform:translateX(-50%);
  background:radial-gradient(ellipse at 50% 65%,#ffffff 0%,#fff0c0 28%,#f0c040 62%,transparent 90%);
  border-radius:50% 50% 35% 35%/60% 60% 45% 45%;filter:blur(.5px);animation:flick .36s ease-in-out infinite reverse;transform-origin:50% 100%}
@keyframes flick{0%,100%{transform:scaleX(1) scaleY(1) rotate(-2deg);opacity:.9}22%{transform:scaleX(.76) scaleY(1.18) rotate(5deg);opacity:.7}48%{transform:scaleX(1.14) scaleY(.86) rotate(-1deg);opacity:.97}72%{transform:scaleX(.82) scaleY(1.12) rotate(6deg);opacity:.74}}
@keyframes glow-p{0%,100%{opacity:1;transform:translate(-50%,-5%) scale(1)}50%{opacity:.58;transform:translate(-50%,-5%) scale(1.18)}}
.hotspot{position:fixed;cursor:pointer;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:20;transition:filter .22s,transform .22s}
.hotspot:hover{filter:drop-shadow(0 0 14px rgba(80,160,255,.75));transform:translateX(-50%) translateY(-4px)}
.hotspot svg{display:block}
.obj-label{margin-top:6px;font-size:.62em;letter-spacing:2.5px;color:rgba(140,190,255,.5);white-space:nowrap;transition:color .2s;text-align:center}
.hotspot:hover .obj-label{color:rgba(140,190,255,.95)}
.hotspot.found{filter:drop-shadow(0 0 8px rgba(80,160,255,.5))}
.hotspot.found .obj-label{color:rgba(120,255,180,.6)}
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 28px 20px;background:linear-gradient(to bottom,rgba(3,12,24,.92) 60%,transparent);pointer-events:none}
#back-btn{pointer-events:all;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(180,210,255,.75);padding:8px 16px;cursor:pointer;font-family:Georgia,serif;font-size:.8em;letter-spacing:1px;border-radius:4px;transition:background .2s}
#back-btn:hover{background:rgba(255,255,255,.13)}
#loc-title{font-size:.82em;letter-spacing:5px;color:#70a8ff;text-shadow:0 0 20px rgba(60,120,255,.4)}
#prog-wrap{display:flex;align-items:center;gap:8px}
.pdot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:transparent;transition:background .4s,border-color .4s}
.pdot.on{background:#5090ff;border-color:#5090ff}
#prog-text{font-size:.72em;color:rgba(100,160,255,.55);font-family:sans-serif}
#hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);font-size:.66em;letter-spacing:3px;color:rgba(140,190,255,.28);pointer-events:none;z-index:30;transition:opacity .3s}
#dlg{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:22px 40px 28px;background:linear-gradient(to top,rgba(3,10,22,.99) 78%,transparent);border-top:1px solid rgba(60,120,255,.1);transform:translateY(110%);transition:transform .36s cubic-bezier(.25,.8,.25,1)}
#dlg.open{transform:translateY(0)}
.dlg-inner{max-width:920px;margin:0 auto;display:flex;gap:20px;align-items:flex-start}
.dlg-icon{width:54px;height:54px;border-radius:50%;flex-shrink:0;background:rgba(40,100,220,.18);border:1px solid rgba(40,100,220,.38);display:flex;align-items:center;justify-content:center;font-size:1.35em;color:#88b8ff}
.dlg-body{flex:1}
.dlg-speaker{font-size:.73em;letter-spacing:3px;color:#6898ff;margin-bottom:6px;text-transform:uppercase}
.dlg-quote{font-style:italic;font-size:1.05em;color:#e0ecff;line-height:1.5;margin-bottom:9px}
.dlg-desc{font-size:.81em;color:rgba(180,210,240,.64);line-height:1.72}
#dlg-close{background:none;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.38);width:28px;height:28px;cursor:pointer;border-radius:4px;font-size:.85em;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
#dlg-close:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
#complete{position:fixed;inset:0;z-index:500;background:rgba(3,10,22,.95);display:none;flex-direction:column;align-items:center;justify-content:center}
#complete.show{display:flex}
.cmp-stars{font-size:2em;letter-spacing:10px;margin-bottom:20px}
.cmp-title{font-size:1.7em;color:#5090ff;letter-spacing:5px;margin-bottom:10px;text-shadow:0 0 30px rgba(60,120,255,.5)}
.cmp-sub{font-size:.82em;color:rgba(140,190,255,.55);letter-spacing:2px;margin-bottom:32px}
.cmp-btn{background:rgba(40,100,220,.14);border:1px solid rgba(40,100,220,.4);color:#5090ff;padding:12px 34px;cursor:pointer;font-family:Georgia,serif;font-size:.88em;letter-spacing:2px;border-radius:4px;transition:background .2s}
.cmp-btn:hover{background:rgba(40,100,220,.26)}
</style>

<script>
const DATA = {
  pheno:{
    icon:'Φ',
    speaker:'Феноменология · Гуссерль',
    quote:'«К самим вещам!» — Эдмунд Гуссерль',
    desc:'Феноменология — метод описания опыта сознания в его непосредственной данности. Гуссерль ввёл понятие "интенциональности": сознание всегда направлено на что-то. Метод "эпохе" (феноменологическая редукция) позволяет "вынести за скобки" вопрос о существовании мира и сосредоточиться на чистых структурах переживания. Хайдеггер и Мерло-Понти развили феноменологию в направлении анализа телесного и бытийного опыта.'
  },
  pragma:{
    icon:'P',
    speaker:'Прагматизм · Пирс, Джеймс, Дьюи, Рорти',
    quote:'«Истина — это то, что работает.» — Уильям Джеймс',
    desc:'Прагматизм — американская философская традиция, связывающая истину с практическими последствиями. Чарльз Пирс: значение идеи — это совокупность её практических эффектов. Уильям Джеймс: истина не копирует реальность, а "ведёт" нас эффективно. Джон Дьюи развил инструментализм: мышление — инструмент адаптации. Рорти применил прагматизм к критике традиционной эпистемологии.'
  },
  posit:{
    icon:'∑',
    speaker:'Позитивизм · Конт, Шлик, Карнап, Поппер, Кун',
    quote:'«Знать — чтобы предвидеть, предвидеть — чтобы мочь.» — Огюст Конт',
    desc:'Позитивизм утверждает, что подлинное знание даёт только наука. Конт выделил три стадии познания: теологическую, метафизическую, позитивную. Логический позитивизм (Венский кружок: Шлик, Карнап) требовал верификации: смысл имеет лишь то, что можно проверить. Поппер заменил верификацию фальсификацией. Кун показал, что наука развивается через революционную смену парадигм, а не накопление истин.'
  },
  analyt:{
    icon:'⊢',
    speaker:'Аналитическая философия · Мур, Рассел, Витгенштейн',
    quote:'«Границы моего языка — границы моего мира.» — Витгенштейн',
    desc:'Аналитическая философия исследует язык как ключ к пониманию реальности. Бертран Рассел разработал логический анализ языка и теорию дескрипций. Ранний Витгенштейн ("Трактат"): мир — совокупность фактов, язык — их образ. Поздний Витгенштейн ("Исследования"): значение — это употребление, язык — множество "языковых игр". Дж. Мур отстаивал здравый смысл против идеализма.'
  },
  herme:{
    icon:'H',
    speaker:'Герменевтика · Шлейермахер, Дильтей, Гадамер, Хабермас',
    quote:'«Бытие, которое может быть понято, есть язык.» — Гадамер',
    desc:'Герменевтика — искусство и теория интерпретации текстов и смыслов. Шлейермахер создал общую герменевтику как метод понимания любого текста через "герменевтический круг". Дильтей распространил её на все науки о духе. Гадамер ("Истина и метод") показал, что понимание всегда происходит из "горизонта" традиции и предрассудков. Хабермас применил герменевтику к теории коммуникативного действия.'
  },
  postmod:{
    icon:'✕',
    speaker:'Постмодернизм · Деррида, Делёз, Бодрийяр, Фуко',
    quote:'«Нет ничего вне текста.» — Жак Деррида',
    desc:'Постмодернизм отвергает универсальные "метанарративы" — великие объясняющие системы. Деррида разработал деконструкцию: любой текст несёт следы противоречий и отсрочек смысла. Бодрийяр описал общество симулякров: реальность вытеснена знаками, ссылающимися только на другие знаки. Делёз предложил философию различия и ризомы. Фуко исследовал власть-знание: дискурс формирует, что считается истиной и нормой.'
  }
};

const TOTAL = 6;
let found = new Set();

function update_progress(){
  for(let i=0;i<TOTAL;i++) document.getElementById('d'+i).classList.toggle('on',i<found.size);
  document.getElementById('prog-text').textContent = found.size+' / '+TOTAL;
  localStorage.setItem('modern_sci', found.size);
}

function open_dlg(id){
  const d = DATA[id];
  document.getElementById('dlg-icon').textContent    = d.icon;
  document.getElementById('dlg-speaker').textContent = d.speaker;
  document.getElementById('dlg-quote').textContent   = d.quote;
  document.getElementById('dlg-desc').textContent    = d.desc;
  document.getElementById('dlg').classList.add('open');
  document.getElementById('hint').style.opacity = '0';
  if(!found.has(id)){
    found.add(id);
    document.getElementById('h-'+id).classList.add('found');
    update_progress();
    if(found.size===TOTAL) setTimeout(()=>{ close_dlg(); document.getElementById('complete').classList.add('show'); },1800);
  }
}

function close_dlg(){
  document.getElementById('dlg').classList.remove('open');
  if(found.size<TOTAL) document.getElementById('hint').style.opacity='1';
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') close_dlg(); });

function positionFlames(){
  const svg = document.getElementById('scene-bg');
  const ctm = svg.getScreenCTM(); if(!ctm) return;
  const pt = svg.createSVGPoint();
  pt.x=94; pt.y=418; const l=pt.matrixTransform(ctm);
  const fl=document.getElementById('flame-l'); fl.style.left=l.x+'px'; fl.style.top=l.y+'px';
  pt.x=1506; pt.y=418; const r=pt.matrixTransform(ctm);
  const fr=document.getElementById('flame-r'); fr.style.left=r.x+'px'; fr.style.top=r.y+'px';
}

(function initParallax(){
  const bg=document.getElementById('scene-bg');
  document.addEventListener('mousemove',e=>{
    const cx=(e.clientX/innerWidth-.5)*2, cy=(e.clientY/innerHeight-.5)*2;
    bg.style.transform=`scale(1.04) translate(${cx*-14}px,${cy*-7}px)`;
    positionFlames();
  });
})();

(function initEmbers(){
  const canvas=document.getElementById('embers'), ctx=canvas.getContext('2d');
  let particles=[];
  function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
  function flamePos(id){
    const el=document.getElementById(id); if(!el) return {x:0,y:0};
    const r=el.getBoundingClientRect(); return {x:r.left+r.width*.5, y:r.top+r.height*.35};
  }
  const COLORS=['#f8c030','#e08010','#f8e080','#ffffff','#f0a020'];
  function spawn(x,y){
    particles.push({x:x+(Math.random()-.5)*18,y:y+Math.random()*8,vx:(Math.random()-.5)*1.4,vy:-(Math.random()*2.2+.8),r:Math.random()*2.2+.8,life:1,decay:Math.random()*.012+.006,color:COLORS[Math.floor(Math.random()*COLORS.length)]});
  }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(Math.random()<.75){const p=flamePos('flame-l');spawn(p.x,p.y);}
    if(Math.random()<.75){const p=flamePos('flame-r');spawn(p.x,p.y);}
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vx+=(Math.random()-.5)*.18; p.vy-=.02; p.life-=p.decay;
      ctx.globalAlpha=p.life*p.life; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life+.3,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(tick);
  }
  resize(); window.addEventListener('resize',()=>{ resize(); positionFlames(); }); tick();
})();

requestAnimationFrame(()=>requestAnimationFrame(positionFlames));
</script>
