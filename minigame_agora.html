<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Афинская Агора — Philosophia</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #050818;
  overflow: hidden;
  font-family: Georgia, serif;
  color: #e8e0ff;
  width: 100vw; height: 100vh;
}

/* ── Background scene ── */
#scene-bg {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  will-change: transform;
  transform: scale(1.04); /* extra room for parallax shift */
}

/* ── Ember canvas ── */
#embers {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 5;
}

/* ── Torch flames ── */
.torch-fx {
  position: fixed;
  pointer-events: none;
  z-index: 6;
  transform: translate(-50%, -100%);
}
.torch-glow-anim {
  position: absolute;
  top: 50%; left: 50%;
  width: 160px; height: 160px;
  transform: translate(-50%, -5%);
  background: radial-gradient(circle, rgba(210,110,12,.4) 0%, transparent 68%);
  border-radius: 50%;
  animation: glow-p 1.7s ease-in-out infinite;
}
.flame-outer {
  position: relative;
  width: 22px; height: 40px;
  margin: 0 auto;
  background: radial-gradient(ellipse at 50% 68%, #fff8d0 0%, #f8c030 26%, #f06010 60%, transparent 90%);
  border-radius: 50% 50% 38% 38% / 62% 62% 45% 45%;
  filter: blur(1.8px);
  animation: flick 0.48s ease-in-out infinite;
  transform-origin: 50% 100%;
}
.flame-inner {
  position: absolute;
  bottom: 5px; left: 50%;
  width: 11px; height: 22px;
  transform: translateX(-50%);
  background: radial-gradient(ellipse at 50% 65%, #ffffff 0%, #fff8c0 28%, #f8e040 62%, transparent 90%);
  border-radius: 50% 50% 35% 35% / 60% 60% 45% 45%;
  filter: blur(0.5px);
  animation: flick 0.36s ease-in-out infinite reverse;
  transform-origin: 50% 100%;
}
@keyframes flick {
  0%,100% { transform: scaleX(1.00) scaleY(1.00) rotate(-2deg); opacity:.90; }
  22%      { transform: scaleX(0.76) scaleY(1.18) rotate(5deg);  opacity:.70; }
  48%      { transform: scaleX(1.14) scaleY(0.86) rotate(-1deg); opacity:.97; }
  72%      { transform: scaleX(0.82) scaleY(1.12) rotate(6deg);  opacity:.74; }
}
@keyframes glow-p {
  0%,100% { opacity:1;    transform: translate(-50%,-5%) scale(1.00); }
  50%      { opacity:0.58; transform: translate(-50%,-5%) scale(1.18); }
}

/* ── Hotspot characters ── */
.hotspot {
  position: fixed;
  cursor: pointer;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 20;
  transition: filter 0.22s, transform 0.22s;
}
.hotspot:hover {
  filter: drop-shadow(0 0 14px rgba(240,190,70,0.75));
  transform: translateX(-50%) translateY(-4px);
}
.hotspot svg { display: block; }
.char-label {
  margin-top: 6px;
  font-size: 0.62em;
  letter-spacing: 2.5px;
  color: rgba(240,215,140,0.55);
  white-space: nowrap;
  transition: color 0.2s;
}
.hotspot:hover .char-label { color: rgba(240,215,140,0.95); }

.hotspot.found { filter: drop-shadow(0 0 8px rgba(100,255,150,0.4)); }
.hotspot.found .char-label { color: rgba(100,255,180,0.6); }

/* ── HUD ── */
#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 20px;
  background: linear-gradient(to bottom, rgba(5,8,24,.92) 60%, transparent);
  pointer-events: none;
}
#back-btn {
  pointer-events: all;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14);
  color: rgba(220,200,255,.75); padding: 8px 16px; cursor: pointer;
  font-family: Georgia, serif; font-size: .8em; letter-spacing: 1px;
  border-radius: 4px; transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.13); }
#loc-title {
  font-size: .82em; letter-spacing: 5px; color: #e8d8a0;
  text-shadow: 0 0 20px rgba(240,200,100,.4);
}
#prog-wrap { display: flex; align-items: center; gap: 10px; }
.pdot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.2); background: transparent;
  transition: background .4s, border-color .4s;
}
.pdot.on { background: #f0c040; border-color: #f0c040; }
#prog-text { font-size: .72em; color: rgba(240,200,100,.55); font-family: sans-serif; }

/* ── Hint ── */
#hint {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  font-size: .66em; letter-spacing: 3px; color: rgba(200,180,255,.28);
  pointer-events: none; z-index: 30; transition: opacity .3s;
}

/* ── Dialogue panel ── */
#dlg {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  padding: 22px 40px 28px;
  background: linear-gradient(to top, rgba(5,5,18,.99) 78%, transparent);
  border-top: 1px solid rgba(255,255,255,.05);
  transform: translateY(110%);
  transition: transform .36s cubic-bezier(.25,.8,.25,1);
}
#dlg.open { transform: translateY(0); }
.dlg-inner {
  max-width: 920px; margin: 0 auto;
  display: flex; gap: 20px; align-items: flex-start;
}
.dlg-icon {
  width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
  background: rgba(150,100,255,.18); border: 1px solid rgba(150,100,255,.38);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.35em; color: #c0a0ff;
}
.dlg-body { flex: 1; }
.dlg-speaker { font-size: .73em; letter-spacing: 3px; color: #c090ff; margin-bottom: 6px; text-transform: uppercase; }
.dlg-quote { font-style: italic; font-size: 1.05em; color: #ede5d0; line-height: 1.5; margin-bottom: 9px; }
.dlg-desc { font-size: .81em; color: rgba(200,190,230,.64); line-height: 1.72; }
#dlg-close {
  background: none; border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.38);
  width: 28px; height: 28px; cursor: pointer; border-radius: 4px; font-size: .85em;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .2s;
}
#dlg-close:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); }

/* ── Completion ── */
#complete {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(5,5,20,.94);
  display: none; flex-direction: column; align-items: center; justify-content: center;
}
#complete.show { display: flex; }
.cmp-stars { font-size: 2em; letter-spacing: 10px; margin-bottom: 20px; }
.cmp-title { font-size: 1.7em; color: #f0c040; letter-spacing: 5px; margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(240,192,64,.5); }
.cmp-sub { font-size: .82em; color: rgba(200,180,255,.55); letter-spacing: 2px; margin-bottom: 32px; }
.cmp-btn {
  background: rgba(240,192,64,.14); border: 1px solid rgba(240,192,64,.4); color: #f0c040;
  padding: 12px 34px; cursor: pointer; font-family: Georgia, serif; font-size: .88em;
  letter-spacing: 2px; border-radius: 4px; transition: background .2s;
}
.cmp-btn:hover { background: rgba(240,192,64,.26); }
</style>

<!-- ════════════════════════════════════════════
     LOGIC
     ════════════════════════════════════════════ -->
<script>
const DATA = {
  socrates: {
    icon: 'Σ',
    speaker: 'Сократ · 469–399 до н.э.',
    quote: '«Я знаю только то, что ничего не знаю.»',
    desc: 'Сократ не оставил ни строчки — всё знание передавалось устно. Его метод (майевтика) — повивальное искусство истины: через вопросы он помогал собеседнику самому прийти к знанию. Был казнён за «развращение юношества» и отрицание богов.'
  },
  plato: {
    icon: 'Π',
    speaker: 'Платон · 428–348 до н.э.',
    quote: '«Красота — это блеск истины.»',
    desc: 'Платон создал Академию — первый университет Европы. Теория идей: видимый мир — лишь тени истинных форм (идей). В "Государстве" описал идеальный город, управляемый философами. Миф о пещере — главная метафора западной мысли.'
  },
  aristotle: {
    icon: 'Α',
    speaker: 'Аристотель · 384–322 до н.э.',
    quote: '«Человек — политическое животное.»',
    desc: 'Ученик Платона и воспитатель Александра Македонского. Систематизировал всё знание своей эпохи: логику, физику, этику, политику. Ввёл понятие "золотой середины" как добродетели между крайностями. Основал Лицей.'
  },
  scroll: {
    icon: '📜',
    speaker: 'Гераклит · VI–V вв. до н.э.',
    quote: '«В одну и ту же реку нельзя войти дважды.»',
    desc: 'Досократики искали первоначало мироздания: Фалес — вода, Анаксимен — воздух, Гераклит — огонь и Логос. Мир — непрестанный поток изменений, управляемый скрытым разумом. Парменид возразил: истинное бытие неизменно.'
  },
  stone: {
    icon: '🏛',
    speaker: 'Дельфийский оракул',
    quote: '«Γνῶθι σεαυτόν — Познай самого себя.»',
    desc: 'Надпись на храме Аполлона в Дельфах стала главным девизом античной философии. Самопознание — отправная точка всякой мудрости: понять себя значит понять своё место в мире, свои возможности и пределы.'
  }
};

const TOTAL = 5;
let found = new Set();

function update_progress() {
  for (let i = 0; i < TOTAL; i++) {
    document.getElementById('d' + i).classList.toggle('on', i < found.size);
  }
  document.getElementById('prog-text').textContent = found.size + ' / ' + TOTAL;
}

function open_dlg(id) {
  const d = DATA[id];
  document.getElementById('dlg-icon').textContent    = d.icon;
  document.getElementById('dlg-speaker').textContent = d.speaker;
  document.getElementById('dlg-quote').textContent   = d.quote;
  document.getElementById('dlg-desc').textContent    = d.desc;
  document.getElementById('dlg').classList.add('open');
  document.getElementById('hint').style.opacity = '0';

  if (!found.has(id)) {
    found.add(id);
    document.getElementById('h-' + id).classList.add('found');
    update_progress();
    if (found.size === TOTAL) {
      setTimeout(() => {
        close_dlg();
        document.getElementById('complete').classList.add('show');
      }, 1800);
    }
  }
}

function close_dlg() {
  document.getElementById('dlg').classList.remove('open');
  if (found.size < TOTAL) {
    document.getElementById('hint').style.opacity = '1';
  }
}

// ESC closes dialogue
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') close_dlg();
});

// ══════════════════════════════════════════
//  TORCH FLAME POSITIONING
// ══════════════════════════════════════════
function positionFlames() {
  const svg = document.getElementById('scene-bg');
  const ctm = svg.getScreenCTM();
  if (!ctm) return;
  const pt = svg.createSVGPoint();

  pt.x = 94;   pt.y = 408;
  const l = pt.matrixTransform(ctm);
  const fl = document.getElementById('flame-l');
  fl.style.left = l.x + 'px';
  fl.style.top  = l.y + 'px';

  pt.x = 1506; pt.y = 408;
  const r = pt.matrixTransform(ctm);
  const fr = document.getElementById('flame-r');
  fr.style.left = r.x + 'px';
  fr.style.top  = r.y + 'px';
}

// ══════════════════════════════════════════
//  PARALLAX ON MOUSE MOVE
// ══════════════════════════════════════════
(function initParallax() {
  const bg = document.getElementById('scene-bg');
  let tx = 0, ty = 0, cx = 0, cy = 0;

  document.addEventListener('mousemove', e => {
    cx = (e.clientX / window.innerWidth  - 0.5) * 2; // -1..1
    cy = (e.clientY / window.innerHeight - 0.5) * 2;
    tx = cx * -14;
    ty = cy * -7;
    bg.style.transform = `scale(1.04) translate(${tx}px, ${ty}px)`;
    positionFlames(); // re-sync flames with shifted SVG
  });
})();

// ══════════════════════════════════════════
//  EMBER PARTICLES
// ══════════════════════════════════════════
(function initEmbers() {
  const canvas = document.getElementById('embers');
  const ctx    = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function flamePos(id) {
    const el = document.getElementById(id);
    if (!el) return { x: 0, y: 0 };
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width * 0.5, y: r.top + r.height * 0.35 };
  }

  const COLORS = ['#f8c030', '#f06010', '#f8e060', '#ffffff', '#f09020'];

  function spawn(x, y) {
    particles.push({
      x: x + (Math.random() - 0.5) * 18,
      y: y + Math.random() * 8,
      vx: (Math.random() - 0.5) * 1.4,
      vy: -(Math.random() * 2.2 + 0.8),
      r:  Math.random() * 2.2 + 0.8,
      life: 1.0,
      decay: Math.random() * 0.012 + 0.006,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
  }

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (Math.random() < 0.75) { const p = flamePos('flame-l'); spawn(p.x, p.y); }
    if (Math.random() < 0.75) { const p = flamePos('flame-r'); spawn(p.x, p.y); }

    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x   += p.vx;
      p.y   += p.vy;
      p.vx  += (Math.random() - 0.5) * 0.18;
      p.vy  -= 0.02; // slight upward acceleration
      p.life -= p.decay;

      const a = p.life * p.life;
      ctx.globalAlpha = a;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life + 0.3, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }

  resize();
  window.addEventListener('resize', () => { resize(); positionFlames(); });
  tick();
})();

// Initial flame positioning (after layout is ready)
requestAnimationFrame(() => requestAnimationFrame(positionFlames));
</script>
</body>
